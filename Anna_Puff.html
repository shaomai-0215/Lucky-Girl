<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>小泡芙幸运🍀抽奖</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(145deg, #1e2b3c 0%, #0f1a24 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', system-ui; margin: 0; padding: 20px;
        }
        .app-container { max-width: 1300px; width: 100%; background: rgba(255,255,255,0.08); backdrop-filter: blur(2px); border-radius: 64px; padding: 20px 24px 32px; }
        .dashboard { display: flex; flex-wrap: wrap; gap: 28px; justify-content: center; }
        .wheel-area { flex: 2; min-width: 320px; background: rgba(0,0,0,0.25); border-radius: 60px; padding: 20px; }
        .info-area { flex: 1.4; min-width: 280px; background: rgba(30,40,50,0.7); backdrop-filter: blur(8px); border-radius: 48px; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .wheel-wrapper { display: flex; justify-content: center; margin-bottom: 20px; }
        canvas { background: #2a3e4f; border-radius: 50%; box-shadow: 0 20px 35px rgba(0,0,0,0.5); max-width: 460px; width: 100%; aspect-ratio: 1/1; cursor: pointer; }
        .spin-btn { background: linear-gradient(135deg, #ffb347, #ff7e05); border: none; color: white; font-size: 1.8rem; font-weight: bold; padding: 14px 32px; border-radius: 60px; cursor: pointer; width: 80%; margin-top: 20px; }
        .spin-btn:active { transform: translateY(4px); }
        .user-section { background: #0f1a1f; border-radius: 40px; padding: 18px 20px; }
        .input-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .input-group input { flex: 2; padding: 12px 18px; border-radius: 50px; border: none; background: #2c3e2f; color: white; }
        .input-group button { background: #2c6e4f; border: none; color: white; padding: 0 20px; border-radius: 50px; cursor: pointer; }
        .history-box { background: #0a1219b3; border-radius: 36px; padding: 12px 16px; flex: 1; overflow: hidden; }
        .record-list { list-style: none; margin: 0; padding: 0 6px; overflow-y: auto; max-height: 380px; }
        .record-list li { background: #1e2a32c9; padding: 12px 15px; border-radius: 28px; border-left: 6px solid #ffaa33; margin-bottom: 10px; color: #ececec; }
        .prize-edit { background: #101e26; border-radius: 36px; padding: 12px 16px; margin-top: 8px; }
        .prize-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .prize-tag { background: #2c4d3e; padding: 5px 12px; border-radius: 40px; display: inline-flex; gap: 8px; }
        .prize-tag span { cursor: pointer; color: #ffbc6e; }
        .add-prize { display: flex; gap: 8px; }
        .add-prize input { flex: 1; padding: 8px 12px; border-radius: 40px; border: none; background: #1f3a33; color: white; }
        .add-prize button { background: #f39c12; border: none; border-radius: 30px; padding: 0 16px; cursor: pointer; }
        .sync-status { font-size: 0.7rem; text-align: center; margin-top: 10px; color: #aaffdd; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="dashboard">
        <div class="wheel-area">
            <div class="wheel-wrapper"><canvas id="wheelCanvas" width="600" height="600"></canvas></div>
            <div style="text-align: center;"><button class="spin-btn" id="spinButton">✨ 旋转转盘 ✨</button></div>
            <div class="prize-edit">
                <h4>🎁 编辑奖项</h4>
                <div class="prize-list" id="prizeListContainer"></div>
                <div class="add-prize"><input type="text" id="newPrizeInput" placeholder="新奖品名称"><button id="addPrizeBtn">➕ 添加</button></div>
            </div>
        </div>
        <div class="info-area">
            <div class="user-section">
                <h3>🧑‍🤝‍🧑 抽奖人</h3>
                <div class="input-group"><input type="text" id="usernameInput" placeholder="您的名字"><button id="setUserBtn">确认身份</button></div>
                <div id="currentUserDisplay" style="margin-top:8px;color:#c7e0f0;">当前抽奖人: 未设置</div>
            </div>
            <div class="history-box">
                <h3>📋 共享抽奖记录</h3>
                <ul class="record-list" id="recordList"><li class="empty-history">✨ 暂无记录 ✨</li></ul>
                <button id="clearHistoryBtn" style="background:#882d2d; border:none; color:white; border-radius:30px; padding:6px; width:100%; margin-top:12px;">🗑️ 清空记录</button>
            </div>
        </div>
    </div>
    <div class="sync-status" id="syncStatus">☁️ 连接云端中...</div>
</div>

<script>
    // ========== 请替换成您的 Firebase 配置 ==========
    const firebaseConfig = {
        apiKey: "AIzaSyD3RKDKXiX49agTmcF5ciQxLNnbZHto158",
        databaseURL: "https://anna-puff-default-rtdb.asia-southeast1.firebasedatabase.app",
        authDomain: "anna-puff.firebaseapp.com",
        projectId: "anna-puff",
        storageBucket: "anna-puff.firebasestorage.app",
        messagingSenderId: "247577846134",
        appId: "1:247577846134:web:9555c1436be25bf7b0da57"
    };
    // =============================================

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const historyRef = database.ref('sharedWheelHistory');
    const segmentsRef = database.ref('sharedSegments');

    let segments = [];
    let currentRotation = 0;
    let isSpinning = false;
    let animFrame = null;
    let currentUserName = "";
    let canvas, ctx;

    const colorPalette = ["#F05454","#FFC069","#6ECB63","#5D9BEC","#E98A8A","#A366F5","#47B5FF","#FFB26F"];

    segmentsRef.on('value', (snapshot) => {
        let val = snapshot.val();
        if (val && Array.isArray(val) && val.length) {
            segments = val;
        } else {
            segments = ["100", "50", "20", "10", "5", "0"];  // 默认数字奖项
            segmentsRef.set(segments);
        }
        drawWheel();
        renderPrizeTags();
    });

    historyRef.on('value', (snapshot) => {
        let records = snapshot.val();
        let historyArr = records ? Object.values(records) : [];
        historyArr.sort((a,b) => b.timestamp - a.timestamp);
        renderHistoryList(historyArr);
    });

    function renderHistoryList(history) {
        const container = document.getElementById('recordList');
        if (!history.length) {
            container.innerHTML = '<li class="empty-history">✨ 暂无抽奖记录 ✨</li>';
            return;
        }
        let html = '';
        for (let rec of history) {
            html += `<li><strong>${escapeHtml(rec.userName)}</strong> 获得: ${escapeHtml(rec.prizeName)}<br><small>${rec.dateStr} ${rec.timeStr}</small></li>`;
        }
        container.innerHTML = html;
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';}); }

    function drawWheel() {
        if (!ctx) return;
        let size = Math.min(canvas.clientWidth, canvas.clientHeight);
        canvas.width = canvas.height = size;
        let centerX = size/2, centerY = size/2, radius = size * 0.45;
        ctx.clearRect(0,0,size,size);
        if (!segments.length) return;
        let angleStep = Math.PI * 2 / segments.length;
        for (let i=0; i<segments.length; i++) {
            let start = i * angleStep + currentRotation;
            let end = (i+1) * angleStep + currentRotation;
            ctx.beginPath(); ctx.moveTo(centerX,centerY); ctx.arc(centerX,centerY,radius,start,end);
            ctx.fillStyle = colorPalette[i % colorPalette.length]; ctx.fill();
            ctx.strokeStyle = "#FFF"; ctx.lineWidth=2; ctx.stroke();
            ctx.fillStyle = "#fff"; ctx.font = `bold ${Math.floor(radius*0.1)}px "Segoe UI"`;
            let textAngle = start + angleStep/2;
            let x = centerX + Math.cos(textAngle) * radius * 0.7;
            let y = centerY + Math.sin(textAngle) * radius * 0.7;
            let text = segments[i];
            ctx.fillText(text, x-ctx.measureText(text).width/2, y+5);
        }
        // 指针
        ctx.beginPath(); ctx.moveTo(centerX-12,centerY-radius-8); ctx.lineTo(centerX,centerY-radius+8); ctx.lineTo(centerX+12,centerY-radius-8); ctx.fillStyle="#FFD966"; ctx.fill();
    }

    function getCurrentPrizeIndex() {
        if (!segments.length) return -1;
        let angleStep = Math.PI * 2 / segments.length;
        let pointerAngle = -Math.PI/2;
        for (let i=0; i<segments.length; i++) {
            let start = i * angleStep + currentRotation;
            let end = (i+1) * angleStep + currentRotation;
            let p = pointerAngle;
            if (start < 0) { start += 2*Math.PI; end += 2*Math.PI; p += 2*Math.PI; }
            if (p >= start && p < end) return i;
        }
        return 0;
    }

    function addRecordToCloud(prizeName) {
        if (!currentUserName) { alert("请先设置抽奖人姓名"); return false; }
        let now = new Date();
        let record = {
            userName: currentUserName,
            prizeName: prizeName,
            timestamp: now.getTime(),
            dateStr: now.toLocaleDateString('zh-CN'),
            timeStr: now.toLocaleTimeString('zh-CN')
        };
        historyRef.push(record);
        return true;
    }

    function startSpin() {
        if (isSpinning || !segments.length) return;
        if (!currentUserName) { alert("请先输入抽奖人姓名"); return; }
        isSpinning = true;
        document.getElementById('spinButton').disabled = true;

        let randomIndex = Math.floor(Math.random() * segments.length);
        let angleStep = Math.PI * 2 / segments.length;
        let targetSectorMid = randomIndex * angleStep + angleStep/2;
        let pointerAngle = -Math.PI/2;
        let rawFinal = pointerAngle - targetSectorMid;
        let twoPi = Math.PI * 2;
        let finalRotation = rawFinal % twoPi;
        let extraRounds = (Math.floor(Math.random() * 8) + 6) * twoPi;
        finalRotation += extraRounds;

        let startRot = currentRotation;
        let startTime = performance.now();
        function animate(now) {
            let t = Math.min(1, (now - startTime) / 2000);
            let ease = 1 - Math.pow(1-t, 3);
            currentRotation = startRot + (finalRotation - startRot) * ease;
            drawWheel();
            if (t < 1) {
                requestAnimationFrame(animate);
            } else {
                currentRotation = finalRotation % twoPi;
                drawWheel();
                let idx = getCurrentPrizeIndex();
                let prize = segments[idx];
                addRecordToCloud(prize);
                alert(`🎉 ${currentUserName} 抽中: ${prize} 🎉`);
                isSpinning = false;
                document.getElementById('spinButton').disabled = false;
            }
        }
        if (animFrame) cancelAnimationFrame(animFrame);
        animFrame = requestAnimationFrame(animate);
    }

    function renderPrizeTags() {
        let container = document.getElementById('prizeListContainer');
        if (!container) return;
        let html = '';
        segments.forEach((seg, idx) => {
            html += `<div class="prize-tag">${escapeHtml(seg)} <span data-idx="${idx}" class="del-prize">❌</span></div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.del-prize').forEach(el => {
            el.addEventListener('click', (e) => {
                let idx = parseInt(el.dataset.idx);
                if (segments.length > 1) {
                    segments.splice(idx, 1);
                    segmentsRef.set(segments);
                } else { alert("至少保留一个奖项"); }
            });
        });
    }

    function addPrize() {
        let name = document.getElementById('newPrizeInput').value.trim();
        if (!name) return alert("请输入奖品名称");
        segments.push(name);
        segmentsRef.set(segments);
        document.getElementById('newPrizeInput').value = "";
    }

    function setUsername() {
        let name = document.getElementById('usernameInput').value.trim();
        if (!name) return alert("请输入昵称");
        currentUserName = name;
        localStorage.setItem("wheelUserName", name);
        document.getElementById('currentUserDisplay').innerHTML = `当前抽奖人: ${escapeHtml(name)}`;
    }

    function clearHistory() {
        if (confirm("确定清空所有抽奖记录吗？")) historyRef.remove();
    }

    // 初始化
    canvas = document.getElementById('wheelCanvas');
    ctx = canvas.getContext('2d');
    let savedName = localStorage.getItem("wheelUserName");
    if (savedName) { currentUserName = savedName; document.getElementById('usernameInput').value = savedName; document.getElementById('currentUserDisplay').innerHTML = `当前抽奖人: ${escapeHtml(savedName)}`; }
    document.getElementById('spinButton').onclick = startSpin;
    document.getElementById('setUserBtn').onclick = setUsername;
    document.getElementById('addPrizeBtn').onclick = addPrize;
    document.getElementById('clearHistoryBtn').onclick = clearHistory;
    window.addEventListener('resize', () => drawWheel());
    drawWheel();
    document.getElementById('syncStatus').innerHTML = "✅ 已连接云端，记录实时共享";
</script>
</body>
</html>
