<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>小泡芙幸运🍀抽奖</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        /* 样式代码（与之前相同，为节省篇幅此处省略，实际使用时复制完整样式） */
        * { box-sizing: border-box; user-select: none; }
        body { background: linear-gradient(145deg, #1e2b3c, #0f1a24); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 20px; color: #eee; }
        .app-container { max-width: 1500px; margin: 0 auto; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); border-radius: 48px; padding: 20px; }
        .tabs { display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 2px solid #ffb347; padding-bottom: 8px; flex-wrap: wrap; }
        .tab-btn { background: #2c4d3e; border: none; color: #ffd966; font-size: 1.2rem; font-weight: bold; padding: 10px 24px; border-radius: 40px; cursor: pointer; }
        .tab-btn.active { background: #ffb347; color: #1e2b3c; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .dashboard { display: flex; flex-wrap: wrap; gap: 24px; }
        .wheel-card, .stats-card, .gift-card { background: rgba(0,0,0,0.25); border-radius: 48px; padding: 20px; }
        .wheel-card { flex: 2; min-width: 320px; }
        .stats-card { flex: 1.2; min-width: 260px; display: flex; flex-direction: column; gap: 20px; }
        .gift-card { flex: 1.2; min-width: 260px; }
        canvas { background: #2a3e4f; border-radius: 50%; width: 100%; max-width: 450px; aspect-ratio: 1; cursor: pointer; display: block; margin: 0 auto; }
        .spin-btn { background: linear-gradient(135deg, #ffb347, #ff7e05); border: none; color: white; font-size: 1.6rem; font-weight: bold; padding: 12px 24px; border-radius: 60px; margin-top: 16px; cursor: pointer; width: 80%; display: block; margin-left: auto; margin-right: auto; }
        .prize-edit, .add-gift, .admin-manual, .admin-clear-history { background: #101e26; border-radius: 36px; padding: 12px 16px; margin-top: 20px; }
        .prize-list, .gift-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .prize-tag { background: #2c4d3e; padding: 5px 12px; border-radius: 40px; display: inline-flex; gap: 8px; align-items: center; }
        .score-value { font-size: 2rem; font-weight: bold; color: #ffd966; }
        .score-history { max-height: 250px; overflow-y: auto; background: #0f1a1f; border-radius: 28px; padding: 8px; font-size: 0.75rem; }
        .admin-only { display: none; }
        button { cursor: pointer; background: #f39c12; border: none; border-radius: 30px; padding: 0 16px; }
        .clear-history-btn { background: #882d2d; color: white; }
        h3, h4 { margin: 0 0 8px 0; color: #ffd966; }
        input, select, textarea { background: #1f3a33; border: none; padding: 8px; border-radius: 28px; color: white; width: 100%; margin-bottom: 8px; }
        .input-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .input-group input { flex: 2; margin-bottom: 0; }
        .manual-form { display: flex; gap: 8px; flex-wrap: wrap; }
        .manual-form input, .manual-form select { width: auto; flex: 1; margin-bottom: 0; }
        .sync-status { font-size: 0.7rem; text-align: center; margin-top: 12px; color: #aaffdd; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="tabs">
        <button class="tab-btn active" data-tab="wheel">🎡 转盘游戏</button>
        <button class="tab-btn" data-tab="qa">❓ 问答互动</button>
        <button class="tab-btn" data-tab="calendar">📅 日历记录</button>
    </div>

    <!-- 转盘界面 -->
    <div id="wheelTab" class="tab-content active">
        <div class="dashboard">
            <div class="wheel-card">
                <div style="text-align: center;"><canvas id="wheelCanvas" width="600" height="600"></canvas><div><button class="spin-btn" id="spinButton">🎡 旋转转盘 🎡</button></div></div>
                <div class="prize-edit admin-only"><h4>🎁 编辑奖项 (管理员)</h4><div class="prize-list" id="prizeListContainer"></div><div class="add-prize"><input type="text" id="newPrizeInput" placeholder="例如 30%"><button id="addPrizeBtn">➕ 添加</button></div><small>修改后所有人同步</small></div>
            </div>
            <div class="stats-card">
                <div class="user-section" style="background:#0f1a1f; border-radius:32px; padding:15px;"><h3>🧑 抽奖人</h3><div class="input-group"><input type="text" id="usernameInput" placeholder="您的名字"><button id="setUserBtn">确认</button></div><div id="currentUserDisplay" style="margin-top:8px;"></div></div>
                <div class="score-box" style="background:#1e3a2f; border-radius:32px; padding:16px; text-align:center;"><div>💰 当前总资产 (AUD)</div><div class="score-value" id="currentScoreDisplay">100.00</div></div>
                <div><h3>📈 积分变动记录</h3><div class="score-history" id="scoreHistoryList">暂无记录</div><div class="admin-clear-history admin-only"><button id="clearHistoryBtn" class="clear-history-btn">🗑️ 清空所有积分记录</button></div><div class="admin-manual admin-only"><h4>✍️ 手动添加抽奖记录</h4><div class="manual-form"><input type="text" id="manualUserName" placeholder="用户名"><select id="manualPercent"><option value="10%">10%</option><option value="0%">0%</option><option value="20%">20%</option><option value="30%">30%</option><option value="50%">50%</option><option value="100%">100%</option></select><button id="manualAddBtn">➕ 添加记录</button></div></div></div>
            </div>
            <div class="gift-card"><h3>🎁 神秘礼盒 (点击揭开)</h3><div class="gift-list" id="giftList">加载中...</div><div class="add-gift admin-only"><h4>➕ 添加新礼物</h4><input type="text" id="giftName" placeholder="名称"><input type="text" id="giftValue" placeholder="价值"><textarea id="giftDetail" rows="2" placeholder="隐藏内容"></textarea><button id="addGiftBtn">📦 添加礼盒</button></div></div>
        </div>
    </div>

    <!-- 问答界面（简化） -->
    <div id="qaTab" class="tab-content"><div style="background:rgba(0,0,0,0.25); border-radius:48px; padding:20px;"><h3>📝 每日问答</h3><div id="questionList">加载中...</div><div class="question-admin admin-only"><h4>➕ 管理员添加问题</h4><input type="text" id="newQuestionText" placeholder="问题"><textarea id="newQuestionAnswer" placeholder="答案"></textarea><button id="addQuestionBtn">添加</button></div></div></div>
    <div id="calendarTab" class="tab-content"><div style="background:rgba(0,0,0,0.25); border-radius:48px; padding:20px;"><h3>📆 活动日历</h3><div id="calendarGrid" class="calendar-grid"></div><div id="selectedDateEvents" class="score-history"></div></div></div>

    <div class="sync-status" id="syncStatus">☁️ 连接云端同步中...</div>
</div>

<script>
    // ========== 配置：管理员名字 ==========
    const ADMIN_USERNAME = "烧卖";   // 已改好，直接使用
    const firebaseConfig = {
        apiKey: "AIzaSyD3RKDKXiX49agTmcF5ciQxLNnbZHto158",
        databaseURL: "https://anna-puff-default-rtdb.asia-southeast1.firebasedatabase.app",
        authDomain: "anna-puff.firebaseapp.com",
        projectId: "anna-puff",
        storageBucket: "anna-puff.firebasestorage.app",
        messagingSenderId: "247577846134",
        appId: "1:247577846134:web:9555c1436be25bf7b0da57"
    };
    // =============================================

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const segmentsRef = db.ref('wheelSegments');
    const currentScoreRef = db.ref('currentScore');
    const scoreHistoryRef = db.ref('scoreHistory');
    const giftsRef = db.ref('gifts');
    const questionsRef = db.ref('questions');
    const activityLogRef = db.ref('activityLog');

    let segments = ["10%","0%","20%","30%","50%","100%"];
    let currentRotation = 0, isSpinning = false, animFrame = null, currentUserName = "";
    let canvas, ctx;
    const colorPalette = ["#F05454","#FFC069","#6ECB63","#5D9BEC","#E98A8A","#A366F5"];

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function logActivity(type, detail) { if(!currentUserName) currentUserName="游客"; activityLogRef.push({userName:currentUserName,type,detail,timestamp:Date.now(),dateStr:new Date().toLocaleDateString('zh-CN'),timeStr:new Date().toLocaleTimeString('zh-CN')}); }
    function updateAdminUI() { const isAdmin=(currentUserName===ADMIN_USERNAME); document.querySelectorAll('.admin-only').forEach(el=>el.style.display=isAdmin?'block':'none'); }

    function drawWheel() {
        if(!ctx) return;
        let size=Math.min(canvas.clientWidth,canvas.clientHeight);
        canvas.width=canvas.height=size;
        let center=size/2, radius=size*0.45;
        ctx.clearRect(0,0,size,size);
        let angleStep=Math.PI*2/segments.length;
        for(let i=0;i<segments.length;i++){
            let start=i*angleStep+currentRotation, end=(i+1)*angleStep+currentRotation;
            ctx.beginPath(); ctx.moveTo(center,center); ctx.arc(center,center,radius,start,end);
            ctx.fillStyle=colorPalette[i%colorPalette.length]; ctx.fill();
            ctx.strokeStyle="#fff"; ctx.stroke();
            ctx.fillStyle="#fff"; ctx.font=`bold ${Math.floor(radius*0.1)}px "Segoe UI"`;
            let textAngle=start+angleStep/2;
            let x=center+Math.cos(textAngle)*radius*0.7, y=center+Math.sin(textAngle)*radius*0.7;
            ctx.fillText(segments[i], x-ctx.measureText(segments[i]).width/2, y+6);
        }
        ctx.beginPath(); ctx.moveTo(center-14,center-radius-8); ctx.lineTo(center,center-radius+10); ctx.lineTo(center+14,center-radius-8); ctx.fillStyle="#FFD966"; ctx.fill();
    }
    function getCurrentPrizeIndex() {
        let angleStep=Math.PI*2/segments.length, pointer=-Math.PI/2, rot=currentRotation%(Math.PI*2);
        for(let i=0;i<segments.length;i++){
            let start=i*angleStep+rot, end=(i+1)*angleStep+rot;
            let s=((start%(Math.PI*2))+Math.PI*2)%(Math.PI*2), e=((end%(Math.PI*2))+Math.PI*2)%(Math.PI*2), p=(pointer+Math.PI*2)%(Math.PI*2);
            if(s<e){ if(p>=s && p<e) return i; } else { if(p>=s || p<e) return i; }
        }
        return 0;
    }
    function applyScoreTransaction(userName, percentageStr, callback){
        let percent=parseFloat(percentageStr)||0, mul=1+percent/100;
        currentScoreRef.transaction(cur=>cur===null?100:cur*mul,(err,committed,snap)=>{
            if(err){callback(false);return;}
            if(committed){
                currentScoreRef.once('value').then(oldSnap=>{
                    let oldVal=oldSnap.val()||100, newVal=snap.val();
                    scoreHistoryRef.push({userName,percentage:percentageStr,oldScore:oldVal,newScore:newVal,timestamp:Date.now(),dateStr:new Date().toLocaleDateString('zh-CN'),timeStr:new Date().toLocaleTimeString('zh-CN')});
                    callback(true,newVal);
                });
            } else callback(false);
        });
    }
    function startSpin(){
        if(isSpinning||!currentUserName){alert("请先设置抽奖人");return;}
        isSpinning=true; let btn=document.getElementById('spinButton'); btn.disabled=true;
        let targetIdx=Math.floor(Math.random()*segments.length);
        let angleStep=Math.PI*2/segments.length, targetMid=targetIdx*angleStep+angleStep/2;
        let rawFinal=-Math.PI/2-targetMid, twoPi=Math.PI*2;
        let finalRot=((rawFinal%twoPi)+twoPi)%twoPi+(Math.floor(Math.random()*10)+6)*twoPi;
        let startRot=currentRotation, startTime=performance.now();
        function animate(now){
            let t=Math.min(1,(now-startTime)/2000), ease=1-Math.pow(1-t,3);
            currentRotation=startRot+(finalRot-startRot)*ease; drawWheel();
            if(t<1) requestAnimationFrame(animate);
            else{
                currentRotation=finalRot%twoPi; drawWheel();
                let prize=segments[getCurrentPrizeIndex()];
                applyScoreTransaction(currentUserName,prize,(success,newScore)=>{
                    if(success){ alert(`🎉 ${currentUserName} 抽中: ${prize}\n资产 → ${newScore.toFixed(2)} AUD`); logActivity("spin",`抽中 ${prize}`); }
                    else alert("积分更新失败");
                    isSpinning=false; btn.disabled=false;
                });
            }
        }
        if(animFrame) cancelAnimationFrame(animFrame);
        animFrame=requestAnimationFrame(animate);
    }

    function renderPrizeTags(){
        let cont=document.getElementById('prizeListContainer');
        if(!cont)return;
        let html='';
        segments.forEach((seg,i)=>{ html+=`<div class="prize-tag">${escapeHtml(seg)} <span data-idx="${i}" class="del-prize">❌</span></div>`; });
        cont.innerHTML=html;
        document.querySelectorAll('.del-prize').forEach(el=>{ el.onclick=()=>{ let idx=parseInt(el.dataset.idx); if(segments.length>1){ segments.splice(idx,1); segmentsRef.set(segments); logActivity("admin_edit_prize","删除奖项"); } else alert("至少保留一个"); }; });
    }
    function addPrize(){ if(currentUserName!==ADMIN_USERNAME)return; let newName=document.getElementById('newPrizeInput').value.trim(); if(!newName)return; segments.push(newName); segmentsRef.set(segments); logActivity("admin_edit_prize",`添加奖项 ${newName}`); document.getElementById('newPrizeInput').value=""; }
    segmentsRef.on('value', snap=>{ let val=snap.val(); if(val&&val.length) segments=val; else segments=["10%","0%","20%","30%","50%","100%"]; drawWheel(); renderPrizeTags(); });
    currentScoreRef.on('value', snap=>{ let val=snap.val(); document.getElementById('currentScoreDisplay').innerText=(typeof val==='number'?val:100).toFixed(2); });
    scoreHistoryRef.on('value', snap=>{ let data=snap.val(); let arr=data?Object.values(data):[]; let cont=document.getElementById('scoreHistoryList'); if(!arr.length){ cont.innerHTML='<div>暂无记录</div>'; return; } let html=''; arr.slice().reverse().forEach(item=>{ html+=`<div class="history-item"><strong>${escapeHtml(item.userName)}</strong> 转到 ${item.percentage} → ${item.oldScore.toFixed(2)} → ${item.newScore.toFixed(2)}<br><small>${item.dateStr} ${item.timeStr}</small></div>`; }); cont.innerHTML=html; });
    function adminManualAdd(){ if(currentUserName!==ADMIN_USERNAME)return; let user=document.getElementById('manualUserName').value.trim(); let percent=document.getElementById('manualPercent').value; if(!user){ alert("请输入用户名"); return; } applyScoreTransaction(user,percent,(success)=>{ if(success){ alert(`已为 ${user} 添加记录`); logActivity("admin_manual_add",`为 ${user} 添加 ${percent} 记录`); document.getElementById('manualUserName').value=""; } else alert("添加失败"); }); }
    function adminClearHistory(){ if(currentUserName!==ADMIN_USERNAME)return; if(confirm("永久删除所有积分记录？")){ scoreHistoryRef.remove(); logActivity("admin_clear_history","清空所有积分记录"); alert("已清空"); } }
    function renderGifts(giftsObj){ let cont=document.getElementById('giftList'); if(!giftsObj||!Object.keys(giftsObj).length){ cont.innerHTML='<div>暂无礼物</div>'; return; } let html=''; for(let [id,gift] of Object.entries(giftsObj)){ let isRevealed=localStorage.getItem(`gift_revealed_${id}`)==='true'; html+=`<div class="gift-item"><div><span>🎁 ${escapeHtml(gift.name)}</span> <span>${escapeHtml(gift.value||'')}</span></div><div class="gift-detail ${isRevealed?'gift-revealed':'gift-hidden'}" onclick="window.revealGift('${id}','${escapeHtml(gift.detail||'')}')">${isRevealed?escapeHtml(gift.detail||'无详细内容'):'🔒 点击揭开 🔒'}</div></div>`; } cont.innerHTML=html; }
    window.revealGift=function(id,detail){ if(localStorage.getItem(`gift_revealed_${id}`)!=='true'){ localStorage.setItem(`gift_revealed_${id}`,'true'); logActivity("reveal_gift",`揭开礼物 ${id}`); alert("礼物详情: "+detail); giftsRef.once('value').then(snap=>renderGifts(snap.val())); } };
    giftsRef.on('value', snap=>renderGifts(snap.val()));
    function addGift(){ if(currentUserName!==ADMIN_USERNAME)return; let name=document.getElementById('giftName').value.trim(); let value=document.getElementById('giftValue').value.trim(); let detail=document.getElementById('giftDetail').value.trim(); if(!name)return; giftsRef.push({name,value,detail,timestamp:Date.now()}); logActivity("admin_add_gift",`添加礼物 ${name}`); document.getElementById('giftName').value=""; document.getElementById('giftValue').value=""; document.getElementById('giftDetail').value=""; }
    function renderQuestions(questionsObj){ let cont=document.getElementById('questionList'); if(!questionsObj||!Object.keys(questionsObj).length){ cont.innerHTML='<div>暂无问题</div>'; return; } let html=''; for(let [id,q] of Object.entries(questionsObj)){ html+=`<div><strong>${escapeHtml(q.text)}</strong> <button onclick="alert('${escapeHtml(q.answer)}')">查看答案</button> <button class="delete-question admin-only" data-id="${id}">删除</button></div>`; } cont.innerHTML=html; document.querySelectorAll('.delete-question').forEach(btn=>{ btn.onclick=()=>{ if(currentUserName===ADMIN_USERNAME){ questionsRef.child(btn.dataset.id).remove(); logActivity("admin_delete_question","删除问题"); } }; }); }
    questionsRef.on('value', snap=>renderQuestions(snap.val()));
    function addQuestion(){ if(currentUserName!==ADMIN_USERNAME)return; let text=document.getElementById('newQuestionText').value.trim(); let answer=document.getElementById('newQuestionAnswer').value.trim(); if(!text)return; questionsRef.push({text,answer,timestamp:Date.now()}); logActivity("admin_add_question",`添加问题: ${text}`); document.getElementById('newQuestionText').value=""; document.getElementById('newQuestionAnswer').value=""; }
    let activityCache={};
    activityLogRef.on('value', snap=>{
        let data=snap.val(); activityCache={};
        if(data) Object.values(data).forEach(ev=>{ let d=ev.dateStr; if(!activityCache[d]) activityCache[d]=[]; activityCache[d].push(ev); });
        let now=new Date(); buildCalendar(now.getFullYear(), now.getMonth());
    });
    function buildCalendar(year,month){
        let firstDay=new Date(year,month,1), startDay=firstDay.getDay(), daysInMonth=new Date(year,month+1,0).getDate(), prevMonthDays=new Date(year,month,0).getDate();
        let gridHtml='';
        for(let i=0;i<42;i++){
            let dayNum, isCurrent=true, dateObj;
            if(i<startDay){ dayNum=prevMonthDays-startDay+i+1; isCurrent=false; dateObj=new Date(year,month-1,dayNum); }
            else if(i>=startDay+daysInMonth){ dayNum=i-startDay-daysInMonth+1; isCurrent=false; dateObj=new Date(year,month+1,dayNum); }
            else{ dayNum=i-startDay+1; dateObj=new Date(year,month,dayNum); }
            let dateStr=dateObj.toLocaleDateString('zh-CN');
            let hasEvent=activityCache[dateStr]&&activityCache[dateStr].length>0;
            gridHtml+=`<div class="cal-day ${isCurrent?'':'other-month'} ${hasEvent?'has-event':''}" data-date="${dateStr}">${dayNum}</div>`;
        }
        document.getElementById('calendarGrid').innerHTML=gridHtml;
        document.querySelectorAll('.cal-day').forEach(day=>{
            day.onclick=()=>{
                let date=day.dataset.date, events=activityCache[date]||[], container=document.getElementById('selectedDateEvents');
                if(!events.length){ container.innerHTML=`<p>📅 ${date} 无活动</p>`; return; }
                let html=`<h4>${date} 活动记录</h4>`;
                events.forEach(ev=>{ html+=`<div><strong>${escapeHtml(ev.userName)}</strong> ${ev.type}: ${ev.detail}<br><small>${ev.timeStr}</small></div>`; });
                container.innerHTML=html;
            };
        });
    }
    function setUsername(){ let name=document.getElementById('usernameInput').value.trim(); if(!name)return; currentUserName=name; localStorage.setItem("wheelUserName",name); document.getElementById('currentUserDisplay').innerHTML=`✅ 当前抽奖人: ${escapeHtml(name)}${name===ADMIN_USERNAME?' (管理员)':''}`; updateAdminUI(); }
    function loadUserName(){ let saved=localStorage.getItem("wheelUserName"); if(saved){ currentUserName=saved; document.getElementById('usernameInput').value=saved; document.getElementById('currentUserDisplay').innerHTML=`✅ 当前抽奖人: ${escapeHtml(saved)}${saved===ADMIN_USERNAME?' (管理员)':''}`; updateAdminUI(); } else updateAdminUI(); }
    function switchTab(tabId){ document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.getElementById(tabId+'Tab').classList.add('active'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active'); if(tabId==='calendar'){ let now=new Date(); buildCalendar(now.getFullYear(), now.getMonth()); } }
    document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));
    window.onload=()=>{
        canvas=document.getElementById('wheelCanvas'); ctx=canvas.getContext('2d');
        loadUserName(); drawWheel(); window.addEventListener('resize',()=>drawWheel());
        document.getElementById('spinButton').onclick=startSpin;
        document.getElementById('setUserBtn').onclick=setUsername;
        document.getElementById('addPrizeBtn').onclick=addPrize;
        document.getElementById('addGiftBtn').onclick=addGift;
        document.getElementById('manualAddBtn').onclick=adminManualAdd;
        document.getElementById('clearHistoryBtn').onclick=adminClearHistory;
        document.getElementById('addQuestionBtn').onclick=addQuestion;
        document.getElementById('syncStatus').innerHTML="✅ 管理员已就绪，手动添加记录可用";
        let now=new Date(); buildCalendar(now.getFullYear(), now.getMonth());
    };
</script>
</body>
</html>
