    <style>

        .app-container { max-width: 1600px; margin: 0 auto; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); border-radius: 48px; padding: 20px; }

        .tab-btn.active { background: #ffb347; color: #1e2b3c; }

        .score-history { max-height: 300px; overflow-y: auto; background: #0f1a1f; border-radius: 28px; padding: 8px; font-size: 0.75rem; }
        .history-item { border-left: 3px solid #ffb347; padding: 8px; margin-bottom: 12px; background: #1e2a32; border-radius: 16px; }

        .remark-input { flex: 2; background: #2c3e2f; border: none; border-radius: 20px; padding: 4px 8px; color: white; font-size: 0.7rem; width: 70%; }
        .remark-save { background: #2c6e4f; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; }
        .delete-record-btn { background: #882d2d; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; border: none; cursor: pointer; }

        .admin-only { display: none; }
        button { cursor: pointer; background: #f39c12; border: none; border-radius: 30px; padding: 0 16px; touch-action: manipulation; }
        .clear-history-btn { background: #882d2d; color: white; }
        h3, h4 { margin: 0 0 8px 0; color: #ffd966; }
        input, select, textarea { background: #1f3a33; border: none; padding: 8px; border-radius: 28px; color: white; width: 100%; margin-bottom: 8px; }
        .input-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .input-group input { flex: 2; margin-bottom: 0; }
        .manual-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        .sync-status { font-size: 0.7rem; text-align: center; margin-top: 12px; color: #aaffdd; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; background: #0f1a1f; border-radius: 28px; padding: 16px; }
        .cal-weekday { text-align: center; font-weight: bold; color: #ffd966; padding: 8px; }
        .cal-day { background: #1e2a32; border-radius: 20px; padding: 8px 4px; text-align: center; cursor: pointer; transition: 0.1s; min-height: 70px; display: flex; flex-direction: column; justify-content: center; }
        .cal-day.has-event { background: #ffb347; color: #1e2b3c; }

        .music-panel { position: absolute; bottom: 70px; right: 0; width: 420px; background: #1e2a32e6; backdrop-filter: blur(12px); border-radius: 28px; padding: 20px; display: none; flex-direction: column; gap: 12px; border: 1px solid #ffb347; max-height: 550px; overflow-y: auto; transform: translateZ(0); }
        .music-panel.show { display: flex; }

        .score-wrong { color: #e67e6b; font-weight: bold; font-size: 1.8rem; text-align: center; }
        .score-label { font-size: 0.8rem; opacity: 0.8; }
        .quiz-history-list { max-height: 280px; overflow-y: auto; background: #0f1a1f; border-radius: 32px; padding: 12px; margin-top: 12px; }
        .quiz-history-item { background: #1e2a32; border-radius: 40px; padding: 8px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; border-left: 4px solid #ffb347; }

        .bomb-effect { position: fixed; top: 50%; left: 50%; width: 100px; height: 100px; transform: translate(-50%, -50%); background: radial-gradient(circle, #ff4400, #8b0000); border-radius: 50%; animation: bombBlast 0.6s ease-out forwards; pointer-events: none; z-index: 10001; opacity: 0.8; }
        @keyframes bombBlast { 0% { transform: translate(-50%, -50%) scale(0.2); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(3); opacity: 0; } }
        .shake { animation: shakeScreen 0.2s ease-in-out 0s 2; }

        .qa-enhanced-card { background: #0f1a1fcc; border-radius: 32px; padding: 18px; margin-bottom: 20px; border-left: 5px solid #ffb347; }

        .qa-time { font-size: 0.7rem; background: #1e3a2f; padding: 3px 10px; border-radius: 40px; color: #bbddcc; }
        .answer-status { font-size: 0.75rem; background: #2c4d3e; border-radius: 40px; padding: 4px 12px; display: inline-flex; align-items: center; gap: 6px; }
        .red-dot { background: #e74c3c; color: white; border-radius: 50%; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; margin-left: 6px; }
        .answer-input-area { margin: 12px 0 8px; display: flex; gap: 10px; flex-wrap: wrap; }
        .answer-input { flex: 3; background: #2c3e2f; border: 1px solid #5f8b6f; margin: 0; }
        .submit-answer-btn { background: #2c6e4f; padding: 8px 20px; border-radius: 40px; }
        .feedback-area { background: #1e2a2e; border-radius: 28px; padding: 10px 14px; margin-top: 10px; font-size: 0.85rem; }
        .admin-review-panel { margin-top: 30px; background: #101e26e6; border-radius: 48px; padding: 20px; border: 1px solid #ffb347; }
        .admin-review-title { font-size: 1.2rem; border-bottom: 1px dashed #ffb347; padding-bottom: 6px; margin-bottom: 16px; }
        .review-question-block { margin-bottom: 28px; background: #0b151b; border-radius: 32px; padding: 14px; }
        .review-question-text { font-weight: bold; color: #ffb347; margin-bottom: 12px; }
        .user-answer-row { display: flex; justify-content: space-between; align-items: center; background: #1e2a32; margin-bottom: 10px; padding: 8px 16px; border-radius: 60px; flex-wrap: wrap; gap: 12px; }
        .user-answer-info { flex: 2; font-size: 0.85rem; }
        .admin-mark-btns { display: flex; gap: 10px; }
        .mark-correct { background: #2e8b57; color: white; border: none; padding: 5px 12px; border-radius: 40px; }
        .mark-wrong { background: #c0392b; color: white; border: none; padding: 5px 12px; border-radius: 40px; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .modal-content { background-color: #1e2a32; margin: 20% auto; padding: 20px; border-radius: 48px; width: 280px; text-align: center; border: 1px solid #ffb347; }
        .modal-asset { font-size: 2rem; font-weight: bold; color: #ffb347; margin: 15px 0; }
        .close-modal { background: #2c6e4f; border: none; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .clickable-asset { cursor: pointer; color: #ffd966; text-decoration: underline; }
        .asset-list { max-height: 300px; overflow-y: auto; background: #0f1a1f; border-radius: 28px; padding: 8px; }
        .asset-item { display: flex; justify-content: space-between; align-items: center; background: #1e2a32; margin-bottom: 6px; padding: 6px 12px; border-radius: 28px; border-left: 3px solid #ffb347; }
        .reset-form { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .reset-form input, .reset-form select { flex: 1; margin-bottom: 0; }
        .gift-item { background: #1e2a32; border-radius: 32px; padding: 10px 14px; margin-bottom: 10px; border-left: 4px solid #ffb347; }
        .gift-detail { margin-top: 8px; font-size: 0.8rem; background: #0f1a1f; padding: 6px; border-radius: 28px; cursor: pointer; text-align: center; }
        .draft-badge { background: #aa6f20; border-radius: 20px; padding: 2px 8px; font-size: 0.7rem; margin-left: 8px; }
        .delete-user-btn { background: #882d2d; border: none; border-radius: 30px; padding: 2px 8px; margin-left: 8px; font-size: 0.7rem; cursor: pointer; color: white; }
        .delete-user-btn:hover { background: #b33a3a; }
        @media (max-width: 768px) {
            body { padding: 12px; }
            .app-container { padding: 12px; }
            .tabs { gap: 8px; }
            .tab-btn { font-size: 0.9rem; padding: 6px 16px; }
            .dashboard { gap: 16px; }
            .wheel-card, .stats-card, .asset-card { padding: 12px; }
            .score-history { max-height: 250px; }
            .music-panel { width: 90vw; right: 5vw; bottom: 70px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="tabs">
        <button class="tab-btn active" data-tab="wheel">🎡 转盘游戏</button>
        <button class="tab-btn" data-tab="qa">❓ 问答互动</button>
        <button class="tab-btn" data-tab="calendar">📅 日历记录</button>
    </div>

    <div id="wheelTab" class="tab-content active">
        <div class="dashboard">
            <div class="wheel-card"><div style="text-align: center;"><canvas id="wheelCanvas" width="600" height="600"></canvas><div><button class="spin-btn" id="spinButton">🎡 旋转转盘 🎡</button></div></div><div class="prize-edit admin-only"><h4>🎁 编辑奖项 (管理员)</h4><div class="prize-list" id="prizeListContainer"></div><div class="add-prize"><input type="text" id="newPrizeInput" placeholder="例如 30%"><button id="addPrizeBtn">➕ 添加</button></div><small>修改后所有人同步</small></div></div>
            <div class="stats-card"><div class="user-section" style="background:#0f1a1f; border-radius:32px; padding:15px;"><h3>🧑 抽奖人</h3><div class="input-group"><input type="text" id="usernameInput" placeholder="您的名字"><button id="setUserBtn">确认</button></div><div id="currentUserDisplay" style="margin-top:8px;"></div></div><div class="score-box" style="background:#1e3a2f; border-radius:32px; padding:16px; text-align:center;"><div>💰 当前用户资产 (AUD)</div><div class="score-value" id="currentScoreDisplay">--</div></div><div><h3>📈 积分变动记录（所有人）</h3><div class="score-history" id="scoreHistoryList">暂无记录</div><div class="admin-clear-history admin-only"><button id="clearHistoryBtn" class="clear-history-btn">🗑️ 清空所有积分记录</button></div><div class="admin-manual admin-only"><h4>✍️ 管理员手动添加记录</h4><div class="manual-form"><input type="text" id="manualUserName" placeholder="用户名"><select id="manualPercent"></select><button id="manualAddBtn">➕ 添加记录</button></div></div></div></div>
            <div class="asset-card"><h3>👥 用户资产实时看板</h3><div class="asset-list" id="assetList"><div>加载中...</div></div><div class="admin-reset-asset admin-only"><h4>🔧 管理员资产重置</h4><div class="reset-form"><input type="text" id="resetUserName" placeholder="用户名"><input type="number" id="resetAmount" placeholder="金额" step="0.01" value="100"><button id="resetAssetBtn">重置资产</button></div></div></div>
        </div>
    </div>

    <div id="qaTab" class="tab-content">
        <div style="background: rgba(0,0,0,0.25); border-radius: 48px; padding: 20px;">
            <h3>📝 每日问答 <span style="font-size:0.7rem;">✨ 参与回答，赢取幸运</span></h3>
            <div class="quiz-stats-board" id="quizStatsBoard">
                <div class="scoreboard">
                    <div class="score-correct">✅ <span id="correctCount">0</span><div class="score-label">答对</div></div>
                    <div class="score-wrong">❌ <span id="wrongCount">0</span><div class="score-label">答错</div></div>
                </div>
                <div style="font-size:0.8rem; opacity:0.7;">📊 你的答题记录</div>
            </div>
            <div id="quizHistoryContainer" class="quiz-history-list">加载中...</div>
            <div id="dynamicQuestionList" style="margin-top:20px;">加载问题中...</div>
            <div id="adminReviewPanel" class="admin-review-panel admin-only"><div class="admin-review-title">🔍 管理员批阅台 (✅ 正确 / ❌ 错误)</div><div id="adminAnswersContainer">等待加载...</div></div>
            <div class="question-admin admin-only" style="margin-top:20px;"><h4>➕ 管理员添加新问题</h4><input type="text" id="newQuestionText" placeholder="问题内容"><textarea id="newQuestionAnswer" rows="2" placeholder="正确答案"></textarea><button id="addQuestionDraftBtn">📝 发布新问题</button></div>
            <div style="margin-top:30px;"><h3>🎁 神秘礼盒</h3><div class="gift-list" id="giftList">加载中...</div><div class="add-gift admin-only" style="margin-top:15px;"><h4>➕ 添加新礼物</h4><input type="text" id="giftName" placeholder="名称"><input type="text" id="giftValue" placeholder="价值"><textarea id="giftDetail" rows="2" placeholder="隐藏内容"></textarea><button id="addGiftBtn">📦 添加礼盒</button></div></div>
        </div>
    </div>

    <div id="calendarTab" class="tab-content">
        <div style="background: rgba(0,0,0,0.25); border-radius: 48px; padding: 20px;">
            <h3>📆 活动日历</h3>
            <div class="calendar-header"><button id="prevMonthBtn">◀ 上月</button><span id="currentYearMonth"></span><button id="nextMonthBtn">下月 ▶</button><button id="todayBtn">回到今天</button></div>
            <div id="calendarGrid" class="calendar-grid"></div>
            <div id="selectedDateEvents" class="selected-date-events"></div>
        </div>
    </div>
    <div class="sync-status" id="syncStatus">☁️ 连接云端同步中...</div>
</div>

<div id="userAssetModal" class="modal" style="display:none;"><div class="modal-content"><h3 id="modalUserName">用户</h3><div class="modal-asset" id="modalAssetValue">--</div><button class="close-modal" onclick="closeModal()">关闭</button></div></div>

<div class="music-player">
    <div class="music-toggle" id="musicToggle">🎵</div>
    <div class="music-panel" id="musicPanel">
        <div class="music-info" id="musicInfo">未播放</div>
        <div class="music-controls">
            <button id="prevBtn">⏮️</button>
            <button id="playPauseBtn">▶️</button>
            <button id="nextBtn">⏭️</button>
        </div>
        <div class="volume-slider">
            <span>🔊</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
        </div>
        <div id="playlistContainer" style="max-height:280px; overflow-y:auto; margin-top:8px;"></div>
        <div class="admin-only" style="margin-top:8px;">
            <input type="text" id="manualSongName" placeholder="歌曲名称" style="width:100%; margin-bottom:4px;">
            <input type="text" id="manualSongUrl" placeholder="歌曲下载链接" style="width:100%; margin-bottom:4px;">
            <button id="addSongByUrlBtn" style="width:100%;">➕ 添加歌曲链接</button>
        </div>
    </div>
</div>

<script>
    const ADMIN_USERNAME = "烧卖";
    const firebaseConfig = {
        apiKey: "AIzaSyD3RKDKXiX49agTmcF5ciQxLNnbZHto158",
        databaseURL: "https://anna-puff-default-rtdb.asia-southeast1.firebasedatabase.app",
        authDomain: "anna-puff.firebaseapp.com",
        projectId: "anna-puff",
        storageBucket: "anna-puff.appspot.com",
        messagingSenderId: "247577846134",
        appId: "1:247577846134:web:9555c1436be25bf7b0da57"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const segmentsRef = db.ref('wheelSegments');
    const userScoresRef = db.ref('userScores');
    const scoreHistoryRef = db.ref('scoreHistory');
    const giftsRef = db.ref('gifts');
    const questionsRef = db.ref('questions');
    const questionAnswersRef = db.ref('questionAnswers');
    const activityLogRef = db.ref('activityLog');
    const playlistRef = db.ref('playlist');

    let segments = ["10%","0%","20%","30%","50%","100%"];
    let currentRotation = 0, isSpinning = false, animFrame = null, currentUserName = "";
    let canvas, ctx;
    const colorPalette = ["#F05454","#FFC069","#6ECB63","#5D9BEC","#E98A8A","#A366F5"];

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            return '&gt;';
        });
    }
    function logActivity(type, detail) { if(!currentUserName) currentUserName="游客"; activityLogRef.push({ userName:currentUserName, type, detail, timestamp:Date.now(), dateStr:new Date().toLocaleDateString('zh-CN'), timeStr:new Date().toLocaleTimeString('zh-CN') }); }
    function updateAdminUI() { document.querySelectorAll('.admin-only').forEach(el=>el.style.display = (currentUserName===ADMIN_USERNAME)?'block':'none'); if(currentUserName===ADMIN_USERNAME) renderAdminReviewPanel(); }

    // 特效
    function showFirework() {
        const fwCanvas = document.createElement('canvas');
        fwCanvas.className = 'firework-canvas';
        document.body.appendChild(fwCanvas);
        const fwCtx = fwCanvas.getContext('2d');
        fwCanvas.width = window.innerWidth;
        fwCanvas.height = window.innerHeight;
        let particles = [];
        for(let i=0;i<60;i++) particles.push({ x:Math.random()*fwCanvas.width, y:Math.random()*fwCanvas.height, radius:Math.random()*6+2, color:`hsl(${Math.random()*360},100%,60%)`, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4-2, life:1 });
        function animate() { fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height); let allDead=true; for(let p of particles){ if(p.life<=0) continue; allDead=false; p.x+=p.vx; p.y+=p.vy; p.life-=0.02; fwCtx.beginPath(); fwCtx.arc(p.x,p.y,p.radius*p.life,0,Math.PI*2); fwCtx.fillStyle=p.color; fwCtx.fill(); } if(allDead) fwCanvas.remove(); else requestAnimationFrame(animate); }
        animate();
        setTimeout(()=>{ if(fwCanvas.parentNode) fwCanvas.remove(); },1500);
    }
    function showBomb() {
        const bombDiv=document.createElement('div'); bombDiv.className='bomb-effect'; document.body.appendChild(bombDiv);

        setTimeout(()=>{ if(bombDiv.parentNode) bombDiv.remove(); },700);
    }

    function drawWheel() { if(!ctx) return; let size=Math.min(canvas.clientWidth,canvas.clientHeight); canvas.width=canvas.height=size; let c=size/2,r=size*0.45; ctx.clearRect(0,0,size,size); if(!segments.length) return; let step=Math.PI*2/segments.length; for(let i=0;i<segments.length;i++){ let s=i*step+currentRotation,e=(i+1)*step+currentRotation; ctx.beginPath(); ctx.moveTo(c,c); ctx.arc(c,c,r,s,e); ctx.fillStyle=colorPalette[i%colorPalette.length]; ctx.fill(); ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.stroke(); ctx.fillStyle="#fff"; ctx.font=`bold ${Math.floor(r*0.1)}px "Segoe UI"`; let angle=s+step/2; let x=c+Math.cos(angle)*r*0.7, y=c+Math.sin(angle)*r*0.7; ctx.fillText(segments[i], x-ctx.measureText(segments[i]).width/2, y+6); } ctx.beginPath(); ctx.moveTo(c-14,c-r-8); ctx.lineTo(c,c-r+10); ctx.lineTo(c+14,c-r-8); ctx.fillStyle="#FFD966"; ctx.fill(); }
    function getCurrentPrizeIndex() { let step=Math.PI*2/segments.length, pointer=-Math.PI/2, rot=currentRotation%(Math.PI*2); for(let i=0;i<segments.length;i++){ let s=i*step+rot, e=(i+1)*step+rot; let ps=((s%(Math.PI*2))+Math.PI*2)%(Math.PI*2), pe=((e%(Math.PI*2))+Math.PI*2)%(Math.PI*2), p=(pointer+Math.PI*2)%(Math.PI*2); if(ps<pe){ if(p>=ps && p<pe) return i; } else { if(p>=ps || p<pe) return i; } } return 0; }
    function startSpin(){ if(isSpinning||!currentUserName){ alert("请先设置抽奖人"); return; } isSpinning=true; let btn=document.getElementById('spinButton'); btn.disabled=true; let targetIdx=Math.floor(Math.random()*segments.length); let step=Math.PI*2/segments.length, targetMid=targetIdx*step+step/2, rawFinal=-Math.PI/2-targetMid, twoPi=Math.PI*2; let finalRot=((rawFinal%twoPi)+twoPi)%twoPi+(Math.floor(Math.random()*5)+4)*twoPi; let startRot=currentRotation, startTime=performance.now(); const duration=1200; function animate(now){ let t=Math.min(1,(now-startTime)/duration), ease=1-Math.pow(1-t,3); currentRotation=startRot+(finalRot-startRot)*ease; drawWheel(); if(t<1) requestAnimationFrame(animate); else{ currentRotation=finalRot%twoPi; drawWheel(); let prize=segments[getCurrentPrizeIndex()]; applyScoreForUser(currentUserName, prize, (success,newScore)=>{ if(success){ alert(`🎉 ${currentUserName} 抽中: ${prize}\n资产 → ${newScore.toFixed(2)} AUD`); logActivity("spin",`抽中 ${prize}`); } else alert("积分更新失败"); isSpinning=false; btn.disabled=false; }); } } if(animFrame) cancelAnimationFrame(animFrame); animFrame=requestAnimationFrame(animate); }

    async function updateQuizStatsAndHistory() {
        if(!currentUserName) return;
        const questionsSnap = await questionsRef.once('value');
        const questions = questionsSnap.val() || {};
        const answersSnap = await questionAnswersRef.once('value');
        const userAnswers = answersSnap.val() || {};
        let correctTotal = 0, wrongTotal = 0;
        let historyList = [];
        for(let [qid, q] of Object.entries(questions)) {
            if(!q.published) continue;
            const userRec = userAnswers[qid]?.[currentUserName];
            if(userRec && (userRec.status === 'correct' || userRec.status === 'wrong')) {
                const status = userRec.status;
                if(status === 'correct') correctTotal++;
                else wrongTotal++;
                const timestamp = userRec.reviewedAt || userRec.submittedAt || 0;
                historyList.push({ qid, questionText: q.text, status, timestamp, timeStr: timestamp ? new Date(timestamp).toLocaleString() : '未知' });
            }
        }
        historyList.sort((a,b) => b.timestamp - a.timestamp);
        document.getElementById('correctCount').innerText = correctTotal;
        document.getElementById('wrongCount').innerText = wrongTotal;
        const historyContainer = document.getElementById('quizHistoryContainer');
        if(historyList.length === 0) {
            historyContainer.innerHTML = '<div style="text-align:center; padding:20px;">暂无答题记录，参与问答后显示</div>';
        } else {
            let historyHtml = '';
            for(let h of historyList) {
                const icon = h.status === 'correct' ? '✅' : '❌';
                const colorStyle = h.status === 'correct' ? 'color:#6bdb8e;' : 'color:#e67e6b;';
                historyHtml += `<div class="quiz-history-item"><div class="quiz-history-icon" style="${colorStyle}">${icon}</div><div class="quiz-history-text">${escapeHtml(h.questionText)}</div><div class="quiz-history-time">${h.timeStr}</div></div>`;
            }
            historyContainer.innerHTML = historyHtml;
        }
    }
    function triggerEffect(status) { if(status === 'correct') showFirework(); else if(status === 'wrong') showBomb(); }

    async function renderAllQuestions() {
        const questionsSnap = await questionsRef.once('value');
        const questions = questionsSnap.val() || {};
        if(!currentUserName) { document.getElementById('dynamicQuestionList').innerHTML = '<div style="padding:20px">请先在上方设置抽奖人姓名再参与问答~</div>'; return; }
        const answersSnap = await questionAnswersRef.once('value');
        const userAnswers = answersSnap.val() || {};
        let html = '';
        const sorted = Object.entries(questions).sort((a,b)=> (b[1].timestamp||0) - (a[1].timestamp||0));
        for(let [qid, q] of sorted) {
            if(!q.published && currentUserName !== ADMIN_USERNAME) continue;
            const publishTime = q.timestamp ? new Date(q.timestamp).toLocaleString() : '未知时间';
            const userAnswerObj = userAnswers[qid]?.[currentUserName];
            const hasAnswered = !!userAnswerObj;
            let statusHtml = '', inputArea = '';
            if(!hasAnswered) {
                statusHtml = `<span class="answer-status" style="background:#aa6f20;">⏳ 未回答 <span class="red-dot">!</span></span>`;
                inputArea = `<div class="answer-input-area"><input type="text" class="answer-input" id="answer-${qid}" placeholder="你的答案..."><button class="submit-answer-btn" data-qid="${qid}">✍️ 提交答案</button></div>`;
            } else {
                const answerStatus = userAnswerObj.status;
                if(answerStatus === 'correct') statusHtml = `<span class="answer-status" style="background:#2e8b57;">✅ 已答对</span>`;
                else if(answerStatus === 'wrong') statusHtml = `<span class="answer-status" style="background:#c0392b;">❌ 回答错误</span>`;
                else statusHtml = `<span class="answer-status" style="background:#f39c12;">⏳ 待批阅</span>`;
                inputArea = `<div class="feedback-area">📝 你的答案: ${escapeHtml(userAnswerObj.answer)}<br>📌 状态: ${answerStatus==='correct'?'✓正确':answerStatus==='wrong'?'✗错误':'等待管理员评判'}</div>`;
            }
            html += `<div class="qa-enhanced-card"><div class="qa-header"><div class="qa-question-text">❓ ${escapeHtml(q.text)} ${!hasAnswered ? '<span class="red-dot">!</span>' : ''}</div><div class="qa-time">📅 发布: ${publishTime}</div></div>${statusHtml}${inputArea}</div>`;
        }
        document.getElementById('dynamicQuestionList').innerHTML = html || '<div>暂无已发布的问题，等待管理员更新~</div>';
        document.querySelectorAll('.submit-answer-btn').forEach(btn => {
            btn.onclick = async (e) => {
                const qid = btn.dataset.qid;
                const answerInput = document.getElementById(`answer-${qid}`);
                const userAnswer = answerInput ? answerInput.value.trim() : '';
                if(!userAnswer) { alert("请输入答案"); return; }
                const questionSnap = await questionsRef.child(qid).once('value');
                const question = questionSnap.val();
                if(!question) return;
                const isAutoCorrect = (userAnswer.toLowerCase() === (question.answer || '').toLowerCase());
                const status = isAutoCorrect ? 'correct' : 'pending';
                await questionAnswersRef.child(qid).child(currentUserName).set({ answer: userAnswer, status: status, submittedAt: Date.now(), autoCorrect: isAutoCorrect, reviewerMark: null });
                if(isAutoCorrect) { triggerEffect('correct'); alert("🎉 答案正确！获得恭喜特效~"); }
                else { alert("答案已提交，等待管理员批阅~"); }
                logActivity("answer_question", `问题:${question.text}`);
                await renderAllQuestions(); await updateQuizStatsAndHistory();
                if(currentUserName === ADMIN_USERNAME) renderAdminReviewPanel();
                updateQATabRedDot();
            };
        });
    }

        const answersSnap = await questionAnswersRef.once('value');
        const allAnswers = answersSnap.val() || {};
        const questionsSnap = await questionsRef.once('value');
        const questions = questionsSnap.val() || {};
        let container = document.getElementById('adminAnswersContainer');
        if(!container) return;
        if(Object.keys(allAnswers).length === 0) { container.innerHTML = '<div>暂无用户提交答案</div>'; return; }
        let html = '';
        for(let qid in allAnswers) {
            const questionObj = questions[qid];
            if(!questionObj) continue;
            const answersForQ = allAnswers[qid];
            let userRows = '';
            for(let uid in answersForQ) {
                const record = answersForQ[uid];
                userRows += `<div class="user-answer-row"><div class="user-answer-info"><strong>${escapeHtml(uid)}</strong> 回答: ${escapeHtml(record.answer)}<br><small>提交于 ${new Date(record.submittedAt).toLocaleString()}</small></div><div class="admin-mark-btns">${record.status !== 'correct' ? `<button class="mark-correct" data-qid="${qid}" data-user="${uid}" data-mark="correct">✅ 正确</button>` : '<span style="color:#2e8b57;">已✓正确</span>'}${record.status !== 'wrong' ? `<button class="mark-wrong" data-qid="${qid}" data-user="${uid}" data-mark="wrong">❌ 错误</button>` : '<span style="color:#c0392b;">已✗错误</span>'}</div></div>`;

    function getLunarAndFestival(year, month, day) { let dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`; let festival = lunarFestival2026[dateStr] || festivalMap[`${String(month+1).padStart(2,'0')}${String(day).padStart(2,'0')}`] || ""; return { lunar: "", festival }; }
    function buildCalendar(year, month) {
        const firstDay = new Date(year, month, 1);
        const startWeekday = firstDay.getDay();
        const daysInMonth = new Date(year, month+1, 0).getDate();
        const prevMonthDays = new Date(year, month, 0).getDate();
        const weekdays = ["日","一","二","三","四","五","六"];
        let gridHtml = `<div class="calendar-grid">`;
        weekdays.forEach(w => gridHtml += `<div class="cal-weekday">${w}</div>`);
        for(let i = 0; i < 42; i++) {
            let dayNum, isCurrentMonth = true;
            let displayYear = year, displayMonth = month;
            if(i < startWeekday) { dayNum = prevMonthDays - startWeekday + i + 1; isCurrentMonth = false; displayMonth = month - 1; if(displayMonth < 0) { displayMonth = 11; displayYear--; } }
            else if(i >= startWeekday + daysInMonth) { dayNum = i - startWeekday - daysInMonth + 1; isCurrentMonth = false; displayMonth = month + 1; if(displayMonth > 11) { displayMonth = 0; displayYear++; } }
            else { dayNum = i - startWeekday + 1; }
            let dateObj = new Date(displayYear, displayMonth, dayNum);
            let dateStr = dateObj.toLocaleDateString('zh-CN');
            let hasEvent = activityCache[dateStr] && activityCache[dateStr].length > 0;
            let { festival } = getLunarAndFestival(displayYear, displayMonth, dayNum);
            let festivalHtml = festival ? `<div class="festival">${festival}</div>` : "";
            gridHtml += `<div class="cal-day ${isCurrentMonth ? '' : 'other-month'} ${hasEvent ? 'has-event' : ''}" data-date="${dateStr}"><div class="day-num">${dayNum}</div>${festivalHtml}</div>`;
        }
        gridHtml += `</div>`;
        const grid = document.getElementById('calendarGrid'); if(grid) grid.innerHTML = gridHtml;
        const yearMonthSpan = document.getElementById('currentYearMonth'); if(yearMonthSpan) yearMonthSpan.innerText = `${year}年 ${String(month+1).padStart(2,'0')}月`;
        document.querySelectorAll('.cal-day').forEach(day => {
            day.addEventListener('click', () => {
                let date = day.dataset.date;
                let events = activityCache[date] || [];
                let container = document.getElementById('selectedDateEvents');
                if(!container) return;
                if(!events.length){ container.innerHTML = `<p>📅 ${date} 无活动记录</p>`; return; }
                let html = `<h4>${date} 活动记录</h4>`;
                events.forEach(ev => {
                    const remark = ev.remark || '';
                    let remarkHtml = '';
                    if (currentUserName === ADMIN_USERNAME) {
                        remarkHtml = `<div class="remark-area"><input type="text" class="remark-input" id="remark-${ev.id}" placeholder="添加备注" value="${escapeHtml(remark)}"><button class="remark-save-event" data-id="${ev.id}">保存</button></div>`;
                    } else if (remark) {
                        remarkHtml = `<div class="remark-text">📝 备注：${escapeHtml(remark)}</div>`;
                    }
                    html += `<div class="history-item"><strong>${escapeHtml(ev.userName)}</strong> ${ev.type}: ${ev.detail}<br><small>${ev.timeStr}</small>${remarkHtml}</div>`;
                });
                container.innerHTML = html;
                if (currentUserName === ADMIN_USERNAME) {
                    document.querySelectorAll('.remark-save-event').forEach(btn => {
                        btn.onclick = async (e) => {
                            e.stopPropagation();
                            const id = btn.dataset.id;
                            const newRemark = document.getElementById(`remark-${id}`).value.trim();
                            await activityLogRef.child(id).update({ remark: newRemark });
                            logActivity("admin_add_remark", `为活动记录 ${id} 添加备注`);
                            location.reload();
                        };
                    });
                }
            });
        });
    }
    activityLogRef.on('value', snap => {
        let data = snap.val();
        activityCache = {};
        if(data) for(let [id, ev] of Object.entries(data)) { let date = ev.dateStr; if(!activityCache[date]) activityCache[date] = []; activityCache[date].push({...ev, id: id}); }
        buildCalendar(currentCalendarYear, currentCalendarMonth);
    });
    function changeMonth(delta) { let nm = currentCalendarMonth + delta, ny = currentCalendarYear; if(nm<0){ nm=11; ny--; } if(nm>11){ nm=0; ny++; } currentCalendarYear=ny; currentCalendarMonth=nm; buildCalendar(currentCalendarYear, currentCalendarMonth); }
    function goToday() { let t=new Date(); currentCalendarYear=t.getFullYear(); currentCalendarMonth=t.getMonth(); buildCalendar(currentCalendarYear, currentCalendarMonth); }
    document.getElementById('prevMonthBtn')?.addEventListener('click',()=>changeMonth(-1));
    document.getElementById('nextMonthBtn')?.addEventListener('click',()=>changeMonth(1));
    document.getElementById('todayBtn')?.addEventListener('click',goToday);

    function renderAssetBoard(scores) {
        const container = document.getElementById('assetList');
        if (!container) return;
        if (!scores || Object.keys(scores).length === 0) { container.innerHTML = '<div>暂无用户数据，请先进行抽奖</div>'; return; }
        let html = '';
        for (const [user, asset] of Object.entries(scores)) {
            let assetNum = (typeof asset === 'number') ? asset : 100.0;
            const delBtn = (currentUserName === ADMIN_USERNAME) ? `<button class="delete-user-btn" data-user="${escapeHtml(user)}">🗑️ 删除用户</button>` : '';
            html += `<div class="asset-item"><span class="asset-name clickable-asset" data-user="${escapeHtml(user)}">${escapeHtml(user)}</span><span class="asset-amount">${assetNum.toFixed(2)} AUD</span>${delBtn}</div>`;
        }
        container.innerHTML = html;
        document.querySelectorAll('.clickable-asset').forEach(el => el.addEventListener('click', () => showUserAsset(el.dataset.user)));
        if (currentUserName === ADMIN_USERNAME) {
            document.querySelectorAll('.delete-user-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const userName = btn.dataset.user;
                    if (confirm(`⚠️ 确定删除用户“${userName}”的所有数据吗？不可恢复！`)) {
                        try {
                            await userScoresRef.child(userName).remove();
                            const histSnap = await scoreHistoryRef.orderByChild('userName').equalTo(userName).once('value');
                            histSnap.forEach(child => child.ref.remove());
                            alert(`已删除用户 “${userName}”`);
                            logActivity("admin_delete_user", `删除用户 ${userName}`);
                        } catch (err) { alert("删除失败: " + err.message); }
                    }
                });
            });
        }
    }
    let currentModalListener = null;
    function showUserAsset(userName) {
        const modal = document.getElementById('userAssetModal');
        if (!modal) return;
        document.getElementById('modalUserName').innerText = userName;
        document.getElementById('modalAssetValue').innerText = '加载中...';
        modal.style.display = 'block';
        if (currentModalListener && typeof currentModalListener.off === 'function') currentModalListener.off();
        currentModalListener = userScoresRef.child(userName).on('value', snap => {
            let val = snap.val();
            document.getElementById('modalAssetValue').innerText = ((typeof val === 'number') ? val : 100).toFixed(2) + ' AUD';
        });
    }
    window.closeModal = function() { if (currentModalListener && typeof currentModalListener.off === 'function') currentModalListener.off(); currentModalListener = null; document.getElementById('userAssetModal').style.display = 'none'; };
    window.onclick = function(event) { if (event.target === document.getElementById('userAssetModal')) closeModal(); };

    // ========== 音乐播放器（自动播放，无默认歌单）==========
    let currentPlaylist = [], currentTrackIndex = 0, audioPlayer = new Audio();
    let autoPlayAttempted = false;

    function loadPlaylistFromDB() {
        playlistRef.on('value', snap => {
            const data = snap.val();
            currentPlaylist = [];
            if (data) {
                for (let [id, song] of Object.entries(data)) {
                    currentPlaylist.push({ id, name: song.name, url: song.url });
                }
            }
            renderPlaylistUI();
            if (currentPlaylist.length > 0 && !audioPlayer.src) {
                currentTrackIndex = 0;
                loadTrack(0);
                attemptAutoPlay();
            } else if (currentPlaylist.length === 0) {
                document.getElementById('musicInfo').innerText = '无音乐，管理员可添加歌曲链接';
            }
        });
    }

    function attemptAutoPlay() {
        if (!audioPlayer.src || autoPlayAttempted) return;
        autoPlayAttempted = true;
        const unlocked = localStorage.getItem('audio_unlocked') === 'true';
        if (unlocked) {
            audioPlayer.play().then(() => updatePlayState('playing')).catch(() => waitForInteraction());
        } else {
            audioPlayer.play().then(() => {
                localStorage.setItem('audio_unlocked', 'true');
                updatePlayState('playing');
            }).catch(() => waitForInteraction());
        }
    }

    function waitForInteraction() {
        document.getElementById('playPauseBtn').innerText = '▶️';
        document.getElementById('musicInfo').innerHTML = '🔊 轻点页面任意处开始播放音乐';
        document.addEventListener('click', unlockAudio, { once: true });
        document.addEventListener('touchstart', unlockAudio, { once: true });
    }

    function unlockAudio() {
        audioPlayer.play().then(() => {
            localStorage.setItem('audio_unlocked', 'true');
            updatePlayState('playing');
        }).catch(() => {});
    }

    function updatePlayState(state) {
        if (state === 'playing') {
            document.getElementById('playPauseBtn').innerText = '⏸️';
            document.getElementById('musicInfo').innerHTML = `🎵 ${escapeHtml(currentPlaylist[currentTrackIndex]?.name || '')}`;
        } else {
            document.getElementById('playPauseBtn').innerText = '▶️';
        }
    }

    function renderPlaylistUI() {
        const container = document.getElementById('playlistContainer');
        if (!container) return;
        if (currentPlaylist.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#aaa;">暂无歌曲，管理员可添加歌曲链接</div>';
            return;
        }
        let html = '';
        currentPlaylist.forEach((song, idx) => {
            html += `<div class="playlist-item">
                <span class="playlist-name" data-index="${idx}" style="cursor:pointer; flex:1;">${escapeHtml(song.name)}</span>
                ${currentUserName === ADMIN_USERNAME ? `<button class="playlist-delete" data-id="${song.id}" style="background:#882d2d; border:none; border-radius:20px; padding:2px 8px;">🗑️</button>` : ''}
            </div>`;
        });
        container.innerHTML = html;

        document.querySelectorAll('.playlist-name').forEach(el => {
            el.addEventListener('click', (e) => {
                const idx = parseInt(el.dataset.index);
                if (!isNaN(idx) && idx !== currentTrackIndex) {
                    currentTrackIndex = idx;
                    loadTrack(currentTrackIndex);
                    audioPlayer.play().then(() => updatePlayState('playing')).catch(() => {});
                } else if (!isNaN(idx)) {
                    playPauseMusic();
                }
            });
        });

        if (currentUserName === ADMIN_USERNAME) {
            document.querySelectorAll('.playlist-delete').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.id;
                    const song = currentPlaylist.find(s => s.id === id);
                    if (song && confirm(`删除歌曲 "${song.name}"？`)) {
                        await playlistRef.child(id).remove();
                        logActivity("admin_delete_music", `删除歌曲 ${song.name}`);
                    }
                });
            });
        }
    }

    function loadTrack(index) {
        if (!currentPlaylist.length) return;
        const song = currentPlaylist[index];
        audioPlayer.src = song.url;
        audioPlayer.load();
        document.getElementById('musicInfo').innerHTML = `🎵 ${escapeHtml(song.name)}`;
    }

    function playPauseMusic() {
        if (audioPlayer.paused) {
            audioPlayer.play().then(() => updatePlayState('playing')).catch(() => waitForInteraction());
        } else {
            audioPlayer.pause();
            updatePlayState('paused');
        }
    }

    function nextTrack() {
        if (!currentPlaylist.length) return;
        currentTrackIndex = (currentTrackIndex + 1) % currentPlaylist.length;
        loadTrack(currentTrackIndex);
        audioPlayer.play().then(() => updatePlayState('playing')).catch(() => {});
    }

    function prevTrack() {
        if (!currentPlaylist.length) return;
        currentTrackIndex = (currentTrackIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
        loadTrack(currentTrackIndex);
        audioPlayer.play().then(() => updatePlayState('playing')).catch(() => {});
    }

    async function addSongByUrl() {
        if (currentUserName !== ADMIN_USERNAME) return;
        const name = document.getElementById('manualSongName').value.trim();
        let url = document.getElementById('manualSongUrl').value.trim();
        if (!name || !url) return alert("请输入名称和链接");
        if (!url.startsWith('http')) return alert("链接需以http开头");
        await playlistRef.push({ name: name, url: url, timestamp: Date.now() });
        alert(`已添加歌曲：${name}`);
        logActivity("admin_add_song_by_url", `添加歌曲 ${name}`);
        document.getElementById('manualSongName').value = '';
        document.getElementById('manualSongUrl').value = '';
    }

    function initMusicPlayer() {
        document.getElementById('playPauseBtn')?.addEventListener('click', playPauseMusic);
        document.getElementById('nextBtn')?.addEventListener('click', nextTrack);
        document.getElementById('prevBtn')?.addEventListener('click', prevTrack);
        document.getElementById('volumeSlider')?.addEventListener('input', e => audioPlayer.volume = parseFloat(e.target.value));
        document.getElementById('addSongByUrlBtn')?.addEventListener('click', addSongByUrl);
        document.getElementById('musicToggle')?.addEventListener('click', () => {
            document.getElementById('musicPanel').classList.toggle('show');
        });
        audioPlayer.addEventListener('ended', nextTrack);
        audioPlayer.volume = 0.5;
        loadPlaylistFromDB();
    }

    // 用户管理
    let currentUserScoreListener=null;
    function subscribeToCurrentUserScore() { if(currentUserScoreListener && typeof currentUserScoreListener.off==='function') currentUserScoreListener.off(); if(currentUserName) { currentUserScoreListener = userScoresRef.child(currentUserName).on('value', snap=>{ let val=snap.val(); document.getElementById('currentScoreDisplay').innerText=(typeof val==='number'?val:100).toFixed(2); }); } else document.getElementById('currentScoreDisplay').innerText='--'; }
    function setUsername(){ let name=document.getElementById('usernameInput').value.trim(); if(!name) return; currentUserName=name; localStorage.setItem("wheelUserName",name); document.getElementById('currentUserDisplay').innerHTML=`✅ ${escapeHtml(name)}${name===ADMIN_USERNAME?' (管理员)':''}`; updateAdminUI(); subscribeToCurrentUserScore(); renderAllQuestions(); updateQuizStatsAndHistory(); updateQATabRedDot(); renderPlaylistUI(); }
    function loadUserName(){ let saved=localStorage.getItem("wheelUserName"); if(saved){ currentUserName=saved; document.getElementById('usernameInput').value=saved; document.getElementById('currentUserDisplay').innerHTML=`✅ ${escapeHtml(saved)}${saved===ADMIN_USERNAME?' (管理员)':''}`; updateAdminUI(); subscribeToCurrentUserScore(); renderAllQuestions(); updateQuizStatsAndHistory(); updateQATabRedDot(); } else { updateAdminUI(); document.getElementById('currentScoreDisplay').innerText='--'; renderAllQuestions(); } }

    function switchTab(tabId){ document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.getElementById(tabId+'Tab').classList.add('active'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active'); if(tabId==='calendar') buildCalendar(currentCalendarYear,currentCalendarMonth); if(tabId==='qa') { renderAllQuestions(); if(currentUserName===ADMIN_USERNAME) renderAdminReviewPanel(); updateQuizStatsAndHistory(); } }
    document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.tab)));

    userScoresRef.on('value', (snap) => { renderAssetBoard(snap.val()); });

    window.onload = () => {
        canvas = document.getElementById('wheelCanvas'); ctx = canvas.getContext('2d');
        loadUserName(); drawWheel(); window.addEventListener('resize',()=>drawWheel());
        document.getElementById('spinButton').onclick = startSpin;
        document.getElementById('setUserBtn').onclick = setUsername;
        document.getElementById('addPrizeBtn').onclick = addPrize;
        document.getElementById('addGiftBtn').onclick = addGift;
        document.getElementById('manualAddBtn').onclick = adminManualAdd;
        document.getElementById('clearHistoryBtn').onclick = adminClearHistory;
        document.getElementById('resetAssetBtn').onclick = resetUserAsset;
        populatePercentSelect();
        initMusicPlayer();
        let now = new Date();
        currentCalendarYear = now.getFullYear(); currentCalendarMonth = now.getMonth();
        buildCalendar(currentCalendarYear, currentCalendarMonth);
        document.getElementById('syncStatus').innerHTML = "✅ 手机优化版：答对烟花 答错炸弹 | 记分牌+历史记录 | 红点提示";
        updateQATabRedDot();
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });
    };
</script>
</body>
</html>
