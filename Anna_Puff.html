<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>小泡芙幸运🍀抽奖</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body { background: linear-gradient(145deg, #1e2b3c, #0f1a24); font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 20px; color: #eee; }
        .app-container { max-width: 1600px; margin: 0 auto; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); border-radius: 48px; padding: 20px; }
        .tabs { display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 2px solid #ffb347; padding-bottom: 8px; flex-wrap: wrap; }
        .tab-btn { background: #2c4d3e; border: none; color: #ffd966; font-size: 1.2rem; font-weight: bold; padding: 10px 24px; border-radius: 40px; cursor: pointer; }
        .tab-btn.active { background: #ffb347; color: #1e2b3c; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .dashboard { display: flex; flex-wrap: wrap; gap: 24px; }
        .wheel-card { flex: 2; min-width: 320px; background: rgba(0,0,0,0.25); border-radius: 48px; padding: 20px; }
        .stats-card { flex: 1.4; min-width: 280px; background: rgba(0,0,0,0.25); border-radius: 48px; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .asset-card { flex: 1; min-width: 240px; background: rgba(0,0,0,0.25); border-radius: 48px; padding: 20px; }
        canvas { background: #2a3e4f; border-radius: 50%; width: 100%; max-width: 450px; aspect-ratio: 1; cursor: pointer; display: block; margin: 0 auto; }
        .spin-btn { background: linear-gradient(135deg, #ffb347, #ff7e05); border: none; color: white; font-size: 1.6rem; font-weight: bold; padding: 12px 24px; border-radius: 60px; margin-top: 16px; cursor: pointer; width: 80%; display: block; margin-left: auto; margin-right: auto; }
        .prize-edit, .add-gift, .admin-manual, .admin-clear-history, .question-admin, .admin-reset-asset { background: #101e26; border-radius: 36px; padding: 12px 16px; margin-top: 20px; }
        .prize-list, .gift-list { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
        .prize-tag, .question-item { background: #2c4d3e; padding: 5px 12px; border-radius: 40px; display: inline-flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .score-value { font-size: 2rem; font-weight: bold; color: #ffd966; }
        .score-history { max-height: 300px; overflow-y: auto; background: #0f1a1f; border-radius: 28px; padding: 8px; font-size: 0.75rem; }
        .history-item { border-left: 3px solid #ffb347; padding: 8px; margin-bottom: 12px; background: #1e2a32; border-radius: 16px; }
        .admin-only { display: none; }
        button { cursor: pointer; background: #f39c12; border: none; border-radius: 30px; padding: 0 16px; }
        h3, h4 { margin: 0 0 8px 0; color: #ffd966; }
        input, select, textarea { background: #1f3a33; border: none; padding: 8px; border-radius: 28px; color: white; width: 100%; margin-bottom: 8px; }
        .input-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .sync-status { font-size: 0.7rem; text-align: center; margin-top: 12px; color: #aaffdd; }
        /* 问答增强样式 */
        .qa-container { display: flex; flex-direction: column; gap: 24px; }
        .question-card { background: #0f1a1fcc; border-radius: 40px; padding: 18px; border-left: 6px solid #ffb347; transition: 0.1s; }
        .question-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .question-text { font-size: 1.2rem; font-weight: bold; color: #ffd966; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .question-time { font-size: 0.7rem; background: #1e3a2f; padding: 3px 10px; border-radius: 40px; color: #bbddcc; }
        .answer-status-badge { font-size: 0.75rem; background: #2c4d3e; border-radius: 40px; padding: 3px 12px; display: inline-flex; align-items: center; gap: 6px; }
        .answer-input-area { margin: 12px 0 8px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .answer-input { flex: 3; background: #2c3e2f; border: 1px solid #5f8b6f; margin: 0; }
        .submit-answer-btn { background: #2c6e4f; padding: 8px 18px; border-radius: 40px; font-weight: bold; }
        .feedback-area { background: #1e2a2e; border-radius: 28px; padding: 10px 14px; margin-top: 10px; font-size: 0.85rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .red-dot { background: #e74c3c; color: white; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; margin-left: 8px; }
        .admin-review-panel { margin-top: 40px; background: #101e26e6; border-radius: 48px; padding: 20px; border: 1px solid #ffb347; }
        .admin-review-title { font-size: 1.2rem; border-bottom: 1px dashed #ffb347; padding-bottom: 6px; margin-bottom: 16px; }
        .review-question-block { margin-bottom: 28px; background: #0b151b; border-radius: 32px; padding: 14px; }
        .review-question-text { font-weight: bold; color: #ffb347; margin-bottom: 12px; }
        .user-answer-row { display: flex; justify-content: space-between; align-items: center; background: #1e2a32; margin-bottom: 10px; padding: 8px 16px; border-radius: 60px; flex-wrap: wrap; gap: 12px; }
        .user-answer-info { flex: 2; font-size: 0.85rem; }
        .user-answer-info span { color: #aaffdd; }
        .admin-mark-btns { display: flex; gap: 10px; }
        .mark-correct { background: #2e8b57; color: white; }
        .mark-wrong { background: #c0392b; color: white; }
        .music-player { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .music-toggle { width: 60px; height: 60px; background: #ffb347; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.5); font-size: 32px; }
        .music-panel { position: absolute; bottom: 80px; right: 0; width: 420px; max-width: 85vw; background: #1e2a32f0; backdrop-filter: blur(16px); border-radius: 36px; padding: 20px; display: none; flex-direction: column; gap: 16px; border: 1px solid #ffb347; max-height: 620px; overflow-y: auto; }
        .music-panel.show { display: flex; }
        .music-controls { display: flex; justify-content: center; gap: 24px; }
        .playlist-container { max-height: 300px; overflow-y: auto; margin-top: 8px; }
        .playlist-item { background: #0f1a1f; padding: 8px 12px; border-radius: 40px; margin-bottom: 6px; display: flex; justify-content: space-between; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        .modal-content { background-color: #1e2a32; margin: 20% auto; padding: 20px; border-radius: 48px; width: 280px; text-align: center; }
        .asset-list { max-height: 300px; overflow-y: auto; background: #0f1a1f; border-radius: 28px; padding: 8px; }
        .asset-item { background: #1e2a32; margin-bottom: 6px; padding: 6px 12px; border-radius: 28px; border-left: 3px solid #ffb347; display: flex; justify-content: space-between; }
        .clickable-asset { cursor: pointer; color: #ffd966; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="tabs">
        <button class="tab-btn active" data-tab="wheel">🎡 转盘游戏</button>
        <button class="tab-btn" data-tab="qa">❓ 问答互动</button>
        <button class="tab-btn" data-tab="calendar">📅 日历记录</button>
    </div>

    <!-- 转盘游戏界面 -->
    <div id="wheelTab" class="tab-content active">
        <div class="dashboard">
            <div class="wheel-card"><div style="text-align: center;"><canvas id="wheelCanvas" width="600" height="600"></canvas><div><button class="spin-btn" id="spinButton">🎡 旋转转盘 🎡</button></div></div><div class="prize-edit admin-only"><h4>🎁 编辑奖项</h4><div class="prize-list" id="prizeListContainer"></div><div class="add-prize"><input type="text" id="newPrizeInput" placeholder="例如 30%"><button id="addPrizeBtn">➕ 添加</button></div></div></div>
            <div class="stats-card"><div class="user-section" style="background:#0f1a1f; border-radius:32px; padding:15px;"><h3>🧑 抽奖人</h3><div class="input-group"><input type="text" id="usernameInput" placeholder="您的名字"><button id="setUserBtn">确认</button></div><div id="currentUserDisplay" style="margin-top:8px;"></div></div><div class="score-box" style="background:#1e3a2f; border-radius:32px; padding:16px; text-align:center;"><div>💰 当前用户资产 (AUD)</div><div class="score-value" id="currentScoreDisplay">--</div></div><div><h3>📈 积分变动记录</h3><div class="score-history" id="scoreHistoryList">暂无记录</div><div class="admin-clear-history admin-only"><button id="clearHistoryBtn" class="clear-history-btn">🗑️ 清空所有积分记录</button></div></div></div>
            <div class="asset-card"><h3>👥 用户资产实时看板</h3><div class="asset-list" id="assetList">加载中...</div><div class="admin-reset-asset admin-only"><h4>🔧 管理员资产重置</h4><div class="reset-form"><input type="text" id="resetUserName" placeholder="用户名"><input type="number" id="resetAmount" placeholder="金额" step="0.01" value="100"><button id="resetAssetBtn">重置资产</button></div></div></div>
        </div>
    </div>

    <!-- 问答互动界面（全新增强版） -->
    <div id="qaTab" class="tab-content">
        <div class="qa-container">
            <!-- 普通用户及所有用户可见的问题列表 -->
            <div id="questionsListForAll" style="background:rgba(0,0,0,0.2); border-radius:48px; padding:20px;">
                <h3>📝 每日问答 <span style="font-size:0.7rem;">✨ 参与回答赢好运</span></h3>
                <div id="dynamicQuestionList">加载问题中...</div>
            </div>
            <!-- 管理员批阅面板 (仅管理员可见) -->
            <div id="adminReviewPanel" class="admin-review-panel admin-only">
                <div class="admin-review-title">🔍 管理员批阅台 (对用户答案打✅/❌)</div>
                <div id="adminAnswersContainer">等待加载...</div>
            </div>
            <div class="question-admin admin-only" style="margin-top:20px;"><h4>➕ 管理员添加新问题</h4><input type="text" id="newQuestionText" placeholder="问题内容"><textarea id="newQuestionAnswer" rows="2" placeholder="正确答案"></textarea><button id="addQuestionDraftBtn">📝 发布新问题</button></div>
            <div style="margin-top:30px;"><h3>🎁 神秘礼盒</h3><div class="gift-list" id="giftList">加载中...</div><div class="add-gift admin-only"><h4>➕ 添加新礼物</h4><input type="text" id="giftName" placeholder="名称"><input type="text" id="giftValue" placeholder="价值"><textarea id="giftDetail" rows="2" placeholder="隐藏内容"></textarea><button id="addGiftBtn">📦 添加礼盒</button></div></div>
        </div>
    </div>

    <!-- 日历界面 -->
    <div id="calendarTab" class="tab-content"><div style="background: rgba(0,0,0,0.25); border-radius: 48px; padding: 20px;"><h3>📆 活动日历</h3><div class="calendar-header"><button id="prevMonthBtn">◀ 上月</button><span id="currentYearMonth"></span><button id="nextMonthBtn">下月 ▶</button><button id="todayBtn">回到今天</button></div><div id="calendarGrid" class="calendar-grid"></div><div id="selectedDateEvents" class="selected-date-events"></div></div></div>
    <div class="sync-status" id="syncStatus">☁️ 云端同步 · 问答新功能已开启</div>
</div>

<div id="userAssetModal" class="modal"><div class="modal-content"><h3 id="modalUserName">用户</h3><div class="modal-asset" id="modalAssetValue">--</div><button class="close-modal" onclick="closeModal()">关闭</button></div></div>

<!-- 音乐播放器（保留大面板） -->
<div class="music-player"><div class="music-toggle" id="musicToggle">🎵</div><div class="music-panel" id="musicPanel"><div class="music-info" id="musicInfo">🎧 加载歌单</div><div class="music-controls"><button id="prevBtn">⏮️</button><button id="playPauseBtn">▶️</button><button id="nextBtn">⏭️</button></div><div class="volume-slider"><span>🔊</span><input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5"></div><div class="playlist-container" id="playlistContainer"></div><div class="admin-only"><input type="text" id="manualSongName" placeholder="歌曲名"><input type="text" id="manualSongUrl" placeholder="歌曲链接"><button id="addSongByUrlBtn">➕ 添加歌曲链接</button></div><div class="custom-song" id="useDefaultBtn">↺ 恢复默认歌单</div></div></div>

<script>
    // ========== Firebase 配置 ==========
    const ADMIN_USERNAME = "烧卖";
    const firebaseConfig = { apiKey: "AIzaSyD3RKDKXiX49agTmcF5ciQxLNnbZHto158", databaseURL: "https://anna-puff-default-rtdb.asia-southeast1.firebasedatabase.app", authDomain: "anna-puff.firebaseapp.com", projectId: "anna-puff", storageBucket: "anna-puff.appspot.com", messagingSenderId: "247577846134", appId: "1:247577846134:web:9555c1436be25bf7b0da57" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const segmentsRef = db.ref('wheelSegments');
    const userScoresRef = db.ref('userScores');
    const scoreHistoryRef = db.ref('scoreHistory');
    const giftsRef = db.ref('gifts');
    const questionsRef = db.ref('questions');
    const questionAnswersRef = db.ref('questionAnswers');   // 新增：存储用户答案 { questionId : { userId : { answer, status, submittedAt, reviewedAt, reviewerMark } } }
    const activityLogRef = db.ref('activityLog');
    const playlistRef = db.ref('playlist');

    let segments = ["10%","0%","20%","30%","50%","100%"];
    let currentRotation = 0, isSpinning = false, currentUserName = "";
    let canvas, ctx;
    const colorPalette = ["#F05454","#FFC069","#6ECB63","#5D9BEC","#E98A8A","#A366F5"];
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
    function logActivity(type, detail) { if(!currentUserName) currentUserName="游客"; activityLogRef.push({ userName:currentUserName, type, detail, timestamp:Date.now(), dateStr:new Date().toLocaleDateString('zh-CN'), timeStr:new Date().toLocaleTimeString('zh-CN') }); }
    function updateAdminUI() { document.querySelectorAll('.admin-only').forEach(el=>el.style.display = (currentUserName===ADMIN_USERNAME)?'block':'none'); if(currentUserName===ADMIN_USERNAME) renderAdminReviewPanel(); }

    // ========== 转盘基础逻辑（保持原样） ==========
    function drawWheel() { if(!ctx) return; let size=Math.min(canvas.clientWidth,canvas.clientHeight); canvas.width=canvas.height=size; let c=size/2,r=size*0.45; ctx.clearRect(0,0,size,size); if(!segments.length) return; let step=Math.PI*2/segments.length; for(let i=0;i<segments.length;i++){ let s=i*step+currentRotation,e=(i+1)*step+currentRotation; ctx.beginPath(); ctx.moveTo(c,c); ctx.arc(c,c,r,s,e); ctx.fillStyle=colorPalette[i%colorPalette.length]; ctx.fill(); ctx.strokeStyle="#fff"; ctx.stroke(); ctx.fillStyle="#fff"; ctx.font=`bold ${Math.floor(r*0.1)}px "Segoe UI"`; let angle=s+step/2; let x=c+Math.cos(angle)*r*0.7, y=c+Math.sin(angle)*r*0.7; ctx.fillText(segments[i], x-ctx.measureText(segments[i]).width/2, y+6); } ctx.beginPath(); ctx.moveTo(c-14,c-r-8); ctx.lineTo(c,c-r+10); ctx.lineTo(c+14,c-r-8); ctx.fillStyle="#FFD966"; ctx.fill(); }
    function getCurrentPrizeIndex() { let step=Math.PI*2/segments.length, pointer=-Math.PI/2, rot=currentRotation%(Math.PI*2); for(let i=0;i<segments.length;i++){ let s=i*step+rot, e=(i+1)*step+rot; let ps=((s%(Math.PI*2))+Math.PI*2)%(Math.PI*2), pe=((e%(Math.PI*2))+Math.PI*2)%(Math.PI*2), p=(pointer+Math.PI*2)%(Math.PI*2); if(ps<pe){ if(p>=ps && p<pe) return i; } else { if(p>=ps || p<pe) return i; } } return 0; }
    function startSpin(){ if(isSpinning||!currentUserName){ alert("请先设置抽奖人"); return; } isSpinning=true; let btn=document.getElementById('spinButton'); btn.disabled=true; let targetIdx=Math.floor(Math.random()*segments.length); let step=Math.PI*2/segments.length, targetMid=targetIdx*step+step/2, rawFinal=-Math.PI/2-targetMid, twoPi=Math.PI*2, finalRot=((rawFinal%twoPi)+twoPi)%twoPi+(Math.floor(Math.random()*10)+6)*twoPi; let startRot=currentRotation, startTime=performance.now(); function animate(now){ let t=Math.min(1,(now-startTime)/2000), ease=1-Math.pow(1-t,3); currentRotation=startRot+(finalRot-startRot)*ease; drawWheel(); if(t<1) requestAnimationFrame(animate); else{ currentRotation=finalRot%twoPi; drawWheel(); let prize=segments[getCurrentPrizeIndex()]; applyScoreForUser(currentUserName, prize, (success,newScore)=>{ if(success){ alert(`🎉 ${currentUserName} 抽中: ${prize}\n资产 → ${newScore.toFixed(2)} AUD`); logActivity("spin",`抽中 ${prize}`); } else alert("积分更新失败"); isSpinning=false; btn.disabled=false; }); } } requestAnimationFrame(animate); }
    async function getUserScore(user) { const snap=await userScoresRef.child(user).once('value'); let val=snap.val(); return (val===null||typeof val!=='number')?100.0:val; }
    function getMultiplier(percentageStr) { let percent=parseFloat(percentageStr); if(isNaN(percent)) percent=0; if(percent===0) return 0; return 1+percent/100; }
    function updateUserScore(user, percentageStr, callback) { const multiplier = getMultiplier(percentageStr); userScoresRef.child(user).transaction(cur=>cur===null?100*multiplier:cur*multiplier, (err,committed,snapshot)=>{ if(err||!committed) callback(false); else callback(true, snapshot.val()); }); }
    function addHistoryRecord(userName, percentage, oldScore, newScore) { scoreHistoryRef.push({ userName, percentage, oldScore, newScore, timestamp:Date.now(), dateStr:new Date().toLocaleDateString('zh-CN'), timeStr:new Date().toLocaleTimeString('zh-CN') }); }
    function applyScoreForUser(userName, percentageStr, callback) { getUserScore(userName).then(oldScore=>{ updateUserScore(userName, percentageStr, (success,newScore)=>{ if(success){ addHistoryRecord(userName, percentageStr, oldScore, newScore); callback(true,newScore); } else callback(false); }); }).catch(()=>callback(false)); }
    segmentsRef.on('value', snap=>{ let val=snap.val(); if(val&&val.length) segments=val; else segments=["10%","0%","20%","30%","50%","100%"]; drawWheel(); renderPrizeTags(); });
    function renderPrizeTags(){ let cont=document.getElementById('prizeListContainer'); if(!cont) return; let html=''; segments.forEach((seg,i)=>{ html+=`<div class="prize-tag">${escapeHtml(seg)} <span data-idx="${i}" class="del-prize">❌</span></div>`; }); cont.innerHTML=html; document.querySelectorAll('.del-prize').forEach(el=>{ el.onclick=()=>{ if(segments.length>1){ segments.splice(parseInt(el.dataset.idx),1); segmentsRef.set(segments); } else alert("至少保留一个"); }; }); }
    function addPrize(){ if(currentUserName!==ADMIN_USERNAME) return; let newName=document.getElementById('newPrizeInput').value.trim(); if(!newName) return; segments.push(newName); segmentsRef.set(segments); document.getElementById('newPrizeInput').value=""; }
    function resetUserAsset(){ if(currentUserName!==ADMIN_USERNAME) return; let user=document.getElementById('resetUserName').value.trim(); let amount=parseFloat(document.getElementById('resetAmount').value); if(!user||isNaN(amount)) return; userScoresRef.child(user).set(amount).then(()=>alert(`已将 ${user} 资产设为 ${amount} AUD`)); }
    
    // ========== 问答增强核心 ==========
    // 渲染问题列表（含回答框、状态、红点、发布时间）
    async function renderAllQuestions() {
        const questionsSnap = await questionsRef.once('value');
        const questions = questionsSnap.val() || {};
        if(!currentUserName) { document.getElementById('dynamicQuestionList').innerHTML = '<div style="padding:20px">请先在上方设置抽奖人姓名再参与问答~</div>'; return; }
        let answersSnap = await questionAnswersRef.once('value');
        let userAnswers = answersSnap.val() || {};
        let html = '';
        const sorted = Object.entries(questions).sort((a,b)=> (b[1].timestamp||0) - (a[1].timestamp||0)); // 新问题在前
        for(let [qid, q] of sorted) {
            if(!q.published && currentUserName !== ADMIN_USERNAME) continue;
            const publishedAt = q.timestamp ? new Date(q.timestamp).toLocaleString() : '未知时间';
            const userAnswerObj = userAnswers[qid]?.[currentUserName];
            const hasAnswered = !!userAnswerObj;
            const answerStatus = userAnswerObj?.status; // 'pending', 'correct', 'wrong'
            const adminMark = userAnswerObj?.reviewerMark;
            let statusHtml = '';
            let inputArea = '';
            if(!hasAnswered) {
                statusHtml = `<span class="answer-status-badge" style="background:#aa6f20;">⏳ 未回答 <span class="red-dot">!</span></span>`;
                inputArea = `<div class="answer-input-area"><input type="text" class="answer-input" id="answer-${qid}" placeholder="你的答案..."><button class="submit-answer-btn" data-qid="${qid}">✍️ 提交答案</button></div>`;
            } else {
                if(answerStatus === 'correct') statusHtml = `<span class="answer-status-badge" style="background:#2e8b57;">✅ 已答对 (${adminMark ? '管理员已确认' : '自动比对正确'})</span>`;
                else if(answerStatus === 'wrong') statusHtml = `<span class="answer-status-badge" style="background:#c0392b;">❌ 回答错误</span>`;
                else statusHtml = `<span class="answer-status-badge" style="background:#f39c12;">⏳ 待批阅</span>`;
                inputArea = `<div class="feedback-area">📝 你的答案: ${escapeHtml(userAnswerObj.answer)}<br>📌 状态: ${answerStatus==='correct'?'✓正确':answerStatus==='wrong'?'✗错误':'等待管理员评判'}</div>`;
            }
            html += `<div class="question-card" data-qid="${qid}">
                        <div class="question-header"><div class="question-text">❓ ${escapeHtml(q.text)} ${!hasAnswered ? '<span class="red-dot" style="vertical-align:middle;">1</span>' : ''}</div><div class="question-time">📅 发布: ${publishedAt}</div></div>
                        ${statusHtml}
                        ${inputArea}
                    </div>`;
        }
        document.getElementById('dynamicQuestionList').innerHTML = html || '<div>暂无已发布的问题，等待管理员更新~</div>';
        // 绑定提交答案事件
        document.querySelectorAll('.submit-answer-btn').forEach(btn => {
            btn.onclick = async (e) => {
                const qid = btn.dataset.qid;
                const answerInput = document.getElementById(`answer-${qid}`);
                const userAnswer = answerInput ? answerInput.value.trim() : '';
                if(!userAnswer) { alert("请输入答案"); return; }
                const questionSnap = await questionsRef.child(qid).once('value');
                const question = questionSnap.val();
                if(!question) return;
                const isAutoCorrect = (userAnswer.toLowerCase() === (question.answer || '').toLowerCase());
                const status = isAutoCorrect ? 'correct' : 'pending';
                await questionAnswersRef.child(qid).child(currentUserName).set({
                    answer: userAnswer,
                    status: status,
                    submittedAt: Date.now(),
                    autoCorrect: isAutoCorrect,
                    reviewerMark: null
                });
                alert(isAutoCorrect ? "🎉 答案正确！管理员可再次确认。" : "答案已提交，等待管理员批阅~");
                logActivity("answer_question", `问题:${question.text}`);
                renderAllQuestions(); // 刷新
                if(currentUserName === ADMIN_USERNAME) renderAdminReviewPanel();
            };
        });
    }
    // 管理员批阅面板：列出所有用户回答，带✅/❌按钮
    async function renderAdminReviewPanel() {
        if(currentUserName !== ADMIN_USERNAME) return;
        const answersSnap = await questionAnswersRef.once('value');
        const allAnswers = answersSnap.val() || {};
        const questionsSnap = await questionsRef.once('value');
        const questions = questionsSnap.val() || {};
        let container = document.getElementById('adminAnswersContainer');
        if(!container) return;
        if(Object.keys(allAnswers).length === 0) { container.innerHTML = '<div>暂无用户提交答案</div>'; return; }
        let html = '';
        for(let qid in allAnswers) {
            const questionObj = questions[qid];
            if(!questionObj) continue;
            const answersForQ = allAnswers[qid];
            let userRows = '';
            for(let uid in answersForQ) {
                const record = answersForQ[uid];
                userRows += `<div class="user-answer-row">
                                <div class="user-answer-info"><strong>${escapeHtml(uid)}</strong> 回答: ${escapeHtml(record.answer)}<br><small>提交于 ${new Date(record.submittedAt).toLocaleString()}</small></div>
                                <div class="admin-mark-btns">
                                    ${record.status !== 'correct' ? `<button class="mark-correct" data-qid="${qid}" data-user="${uid}" data-mark="correct">✅ 正确</button>` : '<span style="color:#2e8b57;">已✓正确</span>'}
                                    ${record.status !== 'wrong' ? `<button class="mark-wrong" data-qid="${qid}" data-user="${uid}" data-mark="wrong">❌ 错误</button>` : '<span style="color:#c0392b;">已✗错误</span>'}
                                </div>
                            </div>`;
            }
            if(userRows) html += `<div class="review-question-block"><div class="review-question-text">📌 ${escapeHtml(questionObj.text)}</div>${userRows}</div>`;
        }
        container.innerHTML = html || '无答案数据';
        // 绑定评判按钮
        document.querySelectorAll('.mark-correct, .mark-wrong').forEach(btn => {
            btn.onclick = async (e) => {
                const qid = btn.dataset.qid;
                const uid = btn.dataset.user;
                const mark = btn.dataset.mark;
                const newStatus = (mark === 'correct') ? 'correct' : 'wrong';
                await questionAnswersRef.child(qid).child(uid).update({ status: newStatus, reviewerMark: mark, reviewedAt: Date.now() });
                logActivity("admin_review", `评判用户${uid}的回答为${newStatus}`);
                renderAdminReviewPanel();
                renderAllQuestions();  // 刷新普通视图让用户看到新状态
            };
        });
    }
    // 监听问题变化，实时刷新所有视图
    questionsRef.on('value', () => { renderAllQuestions(); if(currentUserName===ADMIN_USERNAME) renderAdminReviewPanel(); });
    questionAnswersRef.on('value', () => { renderAllQuestions(); if(currentUserName===ADMIN_USERNAME) renderAdminReviewPanel(); });
    
    // 礼物相关
    function renderGifts(giftsObj){ let cont=document.getElementById('giftList'); if(!cont) return; if(!giftsObj||!Object.keys(giftsObj).length){ cont.innerHTML='<div>暂无礼物</div>'; return; } let html=''; for(let [id,gift] of Object.entries(giftsObj)){ let isRevealed=localStorage.getItem(`gift_revealed_${id}`)==='true'; html+=`<div class="gift-item"><div><span>🎁 ${escapeHtml(gift.name)}</span> <span>${escapeHtml(gift.value||'')}</span></div><div class="gift-detail" onclick="revealGift('${id}','${escapeHtml(gift.detail||'')}')">${isRevealed?escapeHtml(gift.detail||'无详细内容'):'🔒 点击揭开 🔒'}</div></div>`; } cont.innerHTML=html; }
    window.revealGift=function(id,detail){ if(localStorage.getItem(`gift_revealed_${id}`)!=='true'){ localStorage.setItem(`gift_revealed_${id}`,'true'); alert("礼物详情: "+detail); giftsRef.once('value').then(snap=>renderGifts(snap.val())); } };
    function addGift(){ if(currentUserName!==ADMIN_USERNAME) return; let name=document.getElementById('giftName').value.trim(); let value=document.getElementById('giftValue').value.trim(); let detail=document.getElementById('giftDetail').value.trim(); if(!name) return; giftsRef.push({name,value,detail,timestamp:Date.now()}); document.getElementById('giftName').value=""; document.getElementById('giftValue').value=""; document.getElementById('giftDetail').value=""; }
    giftsRef.on('value', snap=>renderGifts(snap.val()));
    
    // 添加新问题（管理员直接发布 published=true）
    document.getElementById('addQuestionDraftBtn')?.addEventListener('click', async () => {
        if(currentUserName!==ADMIN_USERNAME) return;
        let text=document.getElementById('newQuestionText').value.trim();
        let answer=document.getElementById('newQuestionAnswer').value.trim();
        if(!text) return;
        await questionsRef.push({ text, answer, published: true, timestamp: Date.now() });
        logActivity("admin_add_question",text);
        document.getElementById('newQuestionText').value='';
        document.getElementById('newQuestionAnswer').value='';
        alert("问题已发布并显示发布时间");
    });
    
    // 用户界面辅助
    function setUsername(){ let name=document.getElementById('usernameInput').value.trim(); if(!name) return; currentUserName=name; localStorage.setItem("wheelUserName",name); document.getElementById('currentUserDisplay').innerHTML=`✅ ${escapeHtml(name)}${name===ADMIN_USERNAME?' (管理员)':''}`; updateAdminUI(); subscribeToCurrentUserScore(); renderAllQuestions(); }
    function loadUserName(){ let saved=localStorage.getItem("wheelUserName"); if(saved){ currentUserName=saved; document.getElementById('usernameInput').value=saved; document.getElementById('currentUserDisplay').innerHTML=`✅ ${escapeHtml(saved)}${saved===ADMIN_USERNAME?' (管理员)':''}`; updateAdminUI(); subscribeToCurrentUserScore(); renderAllQuestions(); } else { updateAdminUI(); renderAllQuestions(); } }
    function subscribeToCurrentUserScore() { if(currentUserName) userScoresRef.child(currentUserName).on('value', snap=>{ let val=snap.val(); document.getElementById('currentScoreDisplay').innerText=(typeof val==='number'?val:100).toFixed(2); }); else document.getElementById('currentScoreDisplay').innerText='--'; }
    
    // 简化的音乐播放器 (保留原样核心)
    let audioPlayer = new Audio(); let currentPlaylist=[], currentTrackIndex=0;
    function loadPlaylistFromDB(){ playlistRef.on('value',snap=>{ let data=snap.val(); currentPlaylist=[]; if(data) for(let [id,song] of Object.entries(data)) currentPlaylist.push({id,name:song.name,url:song.url}); renderPlaylistUI(); if(currentPlaylist.length && !audioPlayer.src) { currentTrackIndex=0; loadTrack(0); } }); }
    function renderPlaylistUI(){ let container=document.getElementById('playlistContainer'); if(!container) return; if(!currentPlaylist.length){ container.innerHTML='<div>暂无歌曲，管理员添加链接</div>'; return; } let html=''; currentPlaylist.forEach((song,idx)=>{ html+=`<div class="playlist-item" data-idx="${idx}">${escapeHtml(song.name)}${currentUserName===ADMIN_USERNAME?`<button class="del-song" data-id="${song.id}">🗑️</button>`:''}</div>`; }); container.innerHTML=html; document.querySelectorAll('.playlist-item').forEach(el=>{ el.addEventListener('click',(e)=>{ if(e.target.tagName!=='BUTTON'){ let idx=parseInt(el.dataset.idx); if(!isNaN(idx)){ currentTrackIndex=idx; loadTrack(currentTrackIndex); audioPlayer.play().catch(()=>{}); } } }); }); if(currentUserName===ADMIN_USERNAME) document.querySelectorAll('.del-song').forEach(btn=>{ btn.onclick=async(e)=>{ e.stopPropagation(); await playlistRef.child(btn.dataset.id).remove(); }; }); }
    function loadTrack(index){ if(!currentPlaylist.length) return; const song=currentPlaylist[index]; audioPlayer.src=song.url; audioPlayer.load(); document.getElementById('musicInfo').innerHTML=`🎵 ${escapeHtml(song.name)}`; }
    function addSongByUrl(){ if(currentUserName!==ADMIN_USERNAME) return; let name=document.getElementById('manualSongName').value.trim(); let url=document.getElementById('manualSongUrl').value.trim(); if(!name||!url) return; playlistRef.push({name,url}); alert("添加成功"); document.getElementById('manualSongName').value=''; document.getElementById('manualSongUrl').value=''; }
    function restoreDefaultPlaylist(){ if(currentUserName!==ADMIN_USERNAME) return; playlistRef.remove().then(()=>{ let def=[{name:"夏日轻风",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},{name:"星光漫游",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"}]; def.forEach(s=>playlistRef.push(s)); alert("已恢复默认歌单"); }); }
    function initMusicPlayer(){ document.getElementById('playPauseBtn')?.addEventListener('click',()=>{ if(audioPlayer.paused) audioPlayer.play(); else audioPlayer.pause(); }); document.getElementById('nextBtn')?.addEventListener('click',()=>{ if(currentPlaylist.length){ currentTrackIndex=(currentTrackIndex+1)%currentPlaylist.length; loadTrack(currentTrackIndex); audioPlayer.play(); } }); document.getElementById('prevBtn')?.addEventListener('click',()=>{ if(currentPlaylist.length){ currentTrackIndex=(currentTrackIndex-1+currentPlaylist.length)%currentPlaylist.length; loadTrack(currentTrackIndex); audioPlayer.play(); } }); document.getElementById('volumeSlider')?.addEventListener('input',e=>audioPlayer.volume=parseFloat(e.target.value)); document.getElementById('useDefaultBtn')?.addEventListener('click',restoreDefaultPlaylist); document.getElementById('addSongByUrlBtn')?.addEventListener('click',addSongByUrl); document.getElementById('musicToggle')?.addEventListener('click',()=>document.getElementById('musicPanel').classList.toggle('show')); loadPlaylistFromDB(); audioPlayer.volume=0.5; }
    
    // 日历占位
    function buildCalendar(y,m){ let grid=document.getElementById('calendarGrid'); if(grid) grid.innerHTML='<div>日历功能运行中，活动记录云端同步</div>'; }
    function changeMonth(delta){} function goToday(){}
    document.getElementById('prevMonthBtn')?.addEventListener('click',()=>changeMonth(-1));
    document.getElementById('nextMonthBtn')?.addEventListener('click',()=>changeMonth(1));
    document.getElementById('todayBtn')?.addEventListener('click',goToday);
    
    window.onload = () => {
        canvas = document.getElementById('wheelCanvas'); ctx = canvas.getContext('2d');
        loadUserName(); drawWheel(); window.addEventListener('resize',()=>drawWheel());
        document.getElementById('spinButton').onclick = startSpin;
        document.getElementById('setUserBtn').onclick = setUsername;
        document.getElementById('addPrizeBtn').onclick = addPrize;
        document.getElementById('addGiftBtn').onclick = addGift;
        document.getElementById('clearHistoryBtn')?.addEventListener('click',()=>{ if(confirm("清空所有积分记录？")) scoreHistoryRef.remove(); });
        document.getElementById('resetAssetBtn').onclick = resetUserAsset;
        initMusicPlayer();
        buildCalendar(new Date().getFullYear(), new Date().getMonth());
        document.getElementById('syncStatus').innerHTML = "✅ 问答新功能：发布时间·用户答题·管理员批阅✅❌，红点提醒未答问题";
    };
</script>
</body>
</html>
