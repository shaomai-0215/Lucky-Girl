<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>泡芙幸运🍀抽奖</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(145deg, #1e2b3c, #0f1a24);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .app-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 20px 24px 32px;
        }
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            justify-content: center;
        }
        .wheel-area {
            flex: 2;
            min-width: 320px;
            background: rgba(0,0,0,0.25);
            border-radius: 60px;
            padding: 20px;
            text-align: center;
        }
        .info-area {
            flex: 1.4;
            min-width: 280px;
            background: rgba(30,40,50,0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        canvas {
            background: #2a3e4f;
            border-radius: 50%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1;
            cursor: pointer;
        }
        .spin-btn {
            background: linear-gradient(135deg, #ffb347, #ff7e05);
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 14px 28px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #a34400;
            transition: 0.05s linear;
            margin-top: 16px;
            width: 80%;
        }
        .spin-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #a34400; }
        .spin-btn:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }
        .user-section, .history-box {
            background: #0f1a1fcc;
            border-radius: 40px;
            padding: 18px 20px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .input-group input {
            flex: 2;
            padding: 12px 18px;
            border-radius: 50px;
            border: none;
            background: #2c3e2f;
            color: white;
            font-size: 1rem;
        }
        .input-group button, .clear-btn {
            background: #2c6e4f;
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        .clear-btn { background: #882d2d; padding: 8px 16px; width: 100%; margin-top: 12px; }
        .record-list {
            list-style: none;
            margin: 0;
            padding: 0;
            max-height: 350px;
            overflow-y: auto;
        }
        .record-list li {
            background: #1e2a32c9;
            padding: 10px 15px;
            border-radius: 28px;
            border-left: 6px solid #ffaa33;
            margin-bottom: 8px;
            color: #ececec;
        }
        .prize-edit {
            background: #101e26;
            border-radius: 36px;
            padding: 12px 16px;
            margin-top: 20px;
        }
        .prize-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 10px 0;
        }
        .prize-tag {
            background: #2c4d3e;
            padding: 6px 14px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .prize-tag span { cursor: pointer; color: #ffbc6e; font-weight: bold; }
        .add-prize { display: flex; gap: 8px; margin-top: 8px; }
        .add-prize input { flex: 1; padding: 8px 12px; border-radius: 40px; border: none; background: #1f3a33; color: white; }
        .add-prize button { background: #f39c12; border: none; border-radius: 30px; padding: 0 16px; cursor: pointer; }
        .sync-status { font-size: 0.7rem; text-align: center; margin-top: 12px; color: #aaffdd; }
        h3, h4 { margin: 0 0 8px 0; color: #ffd966; }
        footer { text-align: center; margin-top: 20px; color: #7c8f9c; font-size: 0.7rem; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="dashboard">
        <!-- 左侧转盘区 -->
        <div class="wheel-area">
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
            <div><button class="spin-btn" id="spinButton">✨ 旋转转盘 ✨</button></div>
            <div class="prize-edit">
                <h4>🎁 编辑奖项 (点击 ❌ 删除)</h4>
                <div class="prize-list" id="prizeListContainer"></div>
                <div class="add-prize">
                    <input type="text" id="newPrizeInput" placeholder="例如 30%">
                    <button id="addPrizeBtn">➕ 添加</button>
                </div>
                <small>修改奖项仅影响本地，不影响云端历史记录</small>
            </div>
        </div>

        <!-- 右侧抽奖人及历史 -->
        <div class="info-area">
            <div class="user-section">
                <h3>🧑‍🤝‍🧑 抽奖人</h3>
                <div class="input-group">
                    <input type="text" id="usernameInput" placeholder="输入您的名字">
                    <button id="setUserBtn">确认身份</button>
                </div>
                <div id="currentUserDisplay" style="margin-top: 10px; color: #ffd966;"></div>
            </div>
            <div class="history-box">
                <h3>📋 共享抽奖记录</h3>
                <ul class="record-list" id="recordList"><li class="empty-history">✨ 暂无记录 ✨</li></ul>
                <button class="clear-btn" id="clearHistoryBtn">🗑️ 清空所有记录</button>
            </div>
        </div>
    </div>
    <div class="sync-status" id="syncStatus">☁️ 同步云端中...</div>
    <footer>✅ 所有记录云端共享，任何用户抽奖，所有人实时可见</footer>
</div>

<script>
    // ========== 请替换成您的 Firebase 配置 ==========
    const firebaseConfig = {
        apiKey: "AIzaSyD3RKDKXiX49agTmcF5ciQxLNnbZHto158",
        databaseURL: "https://anna-puff-default-rtdb.asia-southeast1.firebasedatabase.app",
        authDomain: "anna-puff.firebaseapp.com",
        projectId: "anna-puff",
        storageBucket: "anna-puff.firebasestorage.app",
        messagingSenderId: "247577846134",
        appId: "1:247577846134:web:9555c1436be25bf7b0da57"
    };
    // =============================================

    // 初始化 Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const historyRef = database.ref('percentWheelHistory');  // 新路径，避免旧数据干扰

    // ---------- 全局变量 ----------
    let segments = ["10%", "0%", "20%", "50%", "100%"];   // 默认就是您要的五个百分比
    let currentRotation = 0;
    let isSpinning = false;
    let animFrame = null;
    let currentUserName = "";
    let canvas, ctx;

    // 颜色盘（足够五个）
    const colorPalette = ["#F05454", "#FFC069", "#6ECB63", "#5D9BEC", "#E98A8A"];

    // ---------- 本地存储奖项 ----------
    function saveSegmentsLocal() {
        localStorage.setItem("percentWheelSegments", JSON.stringify(segments));
    }
    function loadSegmentsLocal() {
        const saved = localStorage.getItem("percentWheelSegments");
        if (saved) {
            try {
                let arr = JSON.parse(saved);
                if (Array.isArray(arr) && arr.length > 0) segments = arr;
            } catch(e) {}
        }
        drawWheel();
        renderPrizeTags();
    }

    // ---------- 绘制转盘 ----------
    function drawWheel() {
        if (!ctx) return;
        let size = Math.min(canvas.clientWidth, canvas.clientHeight);
        canvas.width = canvas.height = size;
        let center = size/2, radius = size * 0.45;
        ctx.clearRect(0, 0, size, size);
        if (!segments.length) return;
        let angleStep = Math.PI * 2 / segments.length;
        for (let i = 0; i < segments.length; i++) {
            let start = i * angleStep + currentRotation;
            let end = (i+1) * angleStep + currentRotation;
            ctx.beginPath();
            ctx.moveTo(center, center);
            ctx.arc(center, center, radius, start, end);
            ctx.fillStyle = colorPalette[i % colorPalette.length];
            ctx.fill();
            ctx.strokeStyle = "#FFF";
            ctx.lineWidth = 2;
            ctx.stroke();
            // 绘制文字
            ctx.fillStyle = "#FFFFFF";
            ctx.font = `bold ${Math.floor(radius * 0.1)}px "Segoe UI"`;
            let textAngle = start + angleStep/2;
            let x = center + Math.cos(textAngle) * radius * 0.7;
            let y = center + Math.sin(textAngle) * radius * 0.7;
            let text = segments[i];
            ctx.fillText(text, x - ctx.measureText(text).width/2, y + 6);
        }
        // 绘制指针（固定向上）
        ctx.beginPath();
        ctx.moveTo(center-14, center-radius-8);
        ctx.lineTo(center, center-radius+10);
        ctx.lineTo(center+14, center-radius-8);
        ctx.fillStyle = "#FFD966";
        ctx.fill();
        ctx.fillStyle = "#AA6F20";
        ctx.font = "bold 16px sans-serif";
        ctx.fillText("⬆️", center-7, center-radius-5);
    }

    // 获取当前奖品索引（指针方向固定向上 -PI/2）
    function getCurrentPrizeIndex() {
        if (!segments.length) return -1;
        const angleStep = Math.PI * 2 / segments.length;
        const pointerAngle = -Math.PI / 2;
        // 遍历所有扇区，找到包含指针角度的扇区
        for (let i = 0; i < segments.length; i++) {
            let start = i * angleStep + currentRotation;
            let end = (i+1) * angleStep + currentRotation;
            // 将角度归一化到 [0, 2PI) 进行比较
            let p = pointerAngle;
            let s = start % (Math.PI*2);
            let e = end % (Math.PI*2);
            if (s < 0) s += Math.PI*2;
            if (e < 0) e += Math.PI*2;
            if (p < 0) p += Math.PI*2;
            if (s < e) {
                if (p >= s && p < e) return i;
            } else {
                // 跨越0度的情况
                if (p >= s || p < e) return i;
            }
        }
        // fallback: 返回第一个
        return 0;
    }

    // 抽奖动画
    function startSpin() {
        if (isSpinning) return;
        if (!currentUserName || currentUserName.trim() === "") {
            alert("请先设置抽奖人姓名！");
            return;
        }
        if (segments.length === 0) {
            alert("请至少保留一个奖项！");
            return;
        }
        isSpinning = true;
        const spinBtn = document.getElementById('spinButton');
        spinBtn.disabled = true;

        // 随机决定最终停在哪个奖品上（完全随机）
        const targetIndex = Math.floor(Math.random() * segments.length);
        const angleStep = Math.PI * 2 / segments.length;
        // 目标扇区中间弧度
        const targetMid = targetIndex * angleStep + angleStep/2;
        const pointerAngle = -Math.PI/2;
        // 需要的最终旋转弧度：使得 targetMid + finalRot = pointerAngle (mod 2PI)
        let rawFinal = pointerAngle - targetMid;
        let twoPi = Math.PI * 2;
        let finalRotation = ((rawFinal % twoPi) + twoPi) % twoPi;
        // 增加额外多圈（6~15圈）
        const extraRounds = (Math.floor(Math.random() * 10) + 6) * twoPi;
        finalRotation += extraRounds;

        const startRot = currentRotation;
        const startTime = performance.now();
        const duration = 2000; // 2秒

        function animate(now) {
            const elapsed = now - startTime;
            let t = Math.min(1, elapsed / duration);
            // 缓动 easeOutCubic
            const ease = 1 - Math.pow(1 - t, 3);
            currentRotation = startRot + (finalRotation - startRot) * ease;
            drawWheel();
            if (t < 1) {
                animFrame = requestAnimationFrame(animate);
            } else {
                // 动画完成，对齐最终值
                currentRotation = finalRotation % twoPi;
                drawWheel();
                const idx = getCurrentPrizeIndex();
                const prize = segments[idx];
                // 保存到云端
                addRecordToCloud(prize);
                alert(`🎉 恭喜 ${currentUserName} 抽中: ${prize} 🎉`);
                isSpinning = false;
                spinBtn.disabled = false;
                cancelAnimationFrame(animFrame);
                animFrame = null;
            }
        }
        if (animFrame) cancelAnimationFrame(animFrame);
        animFrame = requestAnimationFrame(animate);
    }

    // 云端添加记录
    function addRecordToCloud(prizeName) {
        const now = new Date();
        const record = {
            userName: currentUserName,
            prizeName: prizeName,
            timestamp: now.getTime(),
            dateStr: `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`,
            timeStr: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`
        };
        historyRef.push(record).catch(err => console.error("写入失败", err));
    }

    // 监听历史记录变化
    historyRef.on('value', (snapshot) => {
        const data = snapshot.val();
        let historyList = [];
        if (data) {
            historyList = Object.values(data);
            historyList.sort((a,b) => b.timestamp - a.timestamp);
        }
        renderHistoryList(historyList);
        const statusDiv = document.getElementById('syncStatus');
        statusDiv.innerHTML = "✅ 已连接云端，记录实时共享";
        statusDiv.style.color = "#aaffdd";
    });

    function renderHistoryList(history) {
        const container = document.getElementById('recordList');
        if (!history.length) {
            container.innerHTML = '<li class="empty-history">✨ 暂无抽奖记录 ✨</li>';
            return;
        }
        let html = '';
        for (let rec of history) {
            html += `<li>
                        <div><strong>${escapeHtml(rec.userName)}</strong> 获得: <span style="color:#ffaa66;">${escapeHtml(rec.prizeName)}</span></div>
                        <div style="font-size:0.7rem; color:#aaa;">${rec.dateStr} ${rec.timeStr}</div>
                      </li>`;
        }
        container.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 清空所有记录
    function clearAllHistory() {
        if (confirm("⚠️ 确定清空所有抽奖记录吗？此操作不可恢复！")) {
            historyRef.remove().then(() => {
                alert("记录已清空");
            }).catch(err => alert("清空失败: " + err));
        }
    }

    // 编辑奖项 UI
    function renderPrizeTags() {
        const container = document.getElementById('prizeListContainer');
        if (!container) return;
        let html = '';
        segments.forEach((seg, idx) => {
            html += `<div class="prize-tag">${escapeHtml(seg)} <span data-idx="${idx}" class="del-prize">❌</span></div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.del-prize').forEach(el => {
            el.addEventListener('click', (e) => {
                let idx = parseInt(el.getAttribute('data-idx'));
                if (segments.length > 1) {
                    segments.splice(idx, 1);
                    saveSegmentsLocal();
                    drawWheel();
                    renderPrizeTags();
                } else {
                    alert("至少保留一个奖项");
                }
            });
        });
    }

    function addPrize() {
        const input = document.getElementById('newPrizeInput');
        let newName = input.value.trim();
        if (newName === "") {
            alert("请输入奖品名称");
            return;
        }
        segments.push(newName);
        saveSegmentsLocal();
        drawWheel();
        renderPrizeTags();
        input.value = "";
    }

    // 设置用户名
    function setUsername() {
        const name = document.getElementById('usernameInput').value.trim();
        if (name === "") {
            alert("请输入昵称");
            return;
        }
        currentUserName = name;
        localStorage.setItem("wheelUserName", name);
        document.getElementById('currentUserDisplay').innerHTML = `🎲 当前抽奖人: <strong>${escapeHtml(name)}</strong>`;
    }

    // 加载保存的用户名
    function loadUserName() {
        const saved = localStorage.getItem("wheelUserName");
        if (saved) {
            currentUserName = saved;
            document.getElementById('usernameInput').value = saved;
            document.getElementById('currentUserDisplay').innerHTML = `🎲 当前抽奖人: <strong>${escapeHtml(saved)}</strong>`;
        } else {
            document.getElementById('currentUserDisplay').innerHTML = `⚠️ 未设置抽奖人`;
        }
    }

    // ---------- 初始化 ----------
    window.addEventListener('load', () => {
        canvas = document.getElementById('wheelCanvas');
        ctx = canvas.getContext('2d');
        loadSegmentsLocal();      // 加载本地奖项（默认就是您要的百分比）
        loadUserName();
        drawWheel();

        // 绑定事件
        document.getElementById('spinButton').addEventListener('click', startSpin);
        document.getElementById('setUserBtn').addEventListener('click', setUsername);
        document.getElementById('clearHistoryBtn').addEventListener('click', clearAllHistory);
        document.getElementById('addPrizeBtn').addEventListener('click', addPrize);
        window.addEventListener('resize', () => drawWheel());

        const statusDiv = document.getElementById('syncStatus');
        statusDiv.innerHTML = "☁️ 正在连接云端...";
    });
</script>
</body>
</html>
